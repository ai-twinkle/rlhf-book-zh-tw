# 附錄 B　不只是「風格」（Beyond "Just Style"）

> 譯自 Nathan Lambert, *Reinforcement Learning from Human Feedback*（rlhfbook.com），2026-07-01 版，原文第 231–235 頁。

RLHF 的早期發展讓它背上了「只是風格轉換（style transfer）」的名聲；其他嚴厲的批評則聚焦於 RLHF 如何操縱資訊在輸出中的呈現方式。本附錄要說明的是：為什麼「風格」是理解 RLHF 所提供價值的核心——以及為什麼它對模型能力與使用者體驗都有正面的影響。

「RLHF 只不過是風格轉換」這種想法，基於兩個原因拖累了 RLHF 的整體敘事。第一個原因是，RLHF 因此被聯想成只是對模型做些微小、無關緊要的改動。當人們談論風格轉換時，不會把它描述成重要或令人興奮的事——他們認為那很表面。然而，風格是人類價值取之不竭的來源；這正是為什麼重新講述既有的故事也能造就新的暢銷書（例如《人類大歷史》（*Sapiens*）），而且風格是我們的智識生態系持續進步的根本環節。風格與資訊本身是交織在一起、密不可分的。

第二個原因是，許多人忽略了一個事實：做得好的 RLHF 能提升模型在主流 LLM 評測上的分數。我們已經在 Llama 3 上看到，不同的風格確實能有意義地改善評測結果 [29]。Llama 3 Instruct 系列模型在 Arena 上得分極高，而普遍接受的解釋是它們的個性比較有趣——比起同時代的其他模型，它們更簡潔也更機智。撇開許多 LLM 使用者執著的基準測試分數不談，如果 RLHF 能單純讓語言模型變得更有趣，那本身就是實實在在交付出去的價值。

在本附錄中，「話多」（chattiness）一詞用來涵蓋以 RLHF 訓練的模型回應長度不斷增加的現象，但它也涵蓋了諸如大量使用 Markdown、表情符號（emoji），以及把答案編排成條列式清單等技巧。為了讓本附錄的討論有具體依據，下面展示了同屬 Tülu 3 家族的兩個模型的補全範例——其一僅經過指令微調（instruction fine-tuning），其二則額外套用了透過長度控制 DPO（length-controlled DPO）進行的偏好微調（preference fine-tuning）。首先是指令微調模型對提示 `What is reinforcement learning from human feedback?`（什麼是基於人類回饋的強化學習？）的補全結果（確切模型為 Llama 3.1 Tulu 3 70B SFT）[6]：

```
基於人類回饋的強化學習（reinforcement learning from human feedback），又稱人在迴路
中的強化學習（human-in-the-loop reinforcement learning），是機器學習的一個子領域，
其主要目標是透過納入來自人類的回饋來訓練強化學習代理人執行任務。這些回饋可以有多種形式，
例如二元獎勵（如「對」或「錯」）、純量獎勵、行動之間的偏好、示範、自然語言指令，或對代理
人行為的糾正。

基於人類回饋的強化學習背後的想法，是利用人類的直覺與決策能力來引導代理人的學習過程。在傳
統的強化學習中，代理人透過與環境互動，並依據那些互動的結果獲得獎勵或懲罰來學習做決策。然
而，定義一個合適的獎勵函數可能既困難又耗時，往往導致獎勵塑形（reward shaping）或獎勵駭
客（reward hacking）——也就是代理人找到出乎意料且往往非預期的方式來最大化獎勵。

透過使用人類回饋，強化學習可以讓人類直接影響學習過程，從而解決其中一些問題。人類訓練者可
以提供即時回饋、依任務的複雜度調整回饋的規模，並根據代理人的進展更新回饋。這種做法可以造
就更穩健、更具泛化能力的代理人，因為引導它們的不是手工打造的獎勵函數，而是人類訓練者細緻
的理解與經驗。

然而，基於人類回饋的強化學習面臨若干挑戰，例如取得人類回饋的高昂成本、主觀且不一致的回饋、
規模化的問題，以及如何有效率且有效地將人類回饋整合進學習演算法的方法。儘管有這些挑戰，這
個領域的研究已在多種應用中展現出可觀的成果，包括機器人學、電子遊戲、義肢控制、自然語言處
理等等。
```

接著是經過 RLHF 之後、來自 Llama 3.1 Tulu 3 70B DPO 的補全結果：

```
基於人類回饋的強化學習（RLHF）是強化學習（RL）的一個子集，其中引導學習過程的獎勵是由人
類提供的，而不是一個預先指定的數值獎勵函數。這在難以或無法設計出合適獎勵函數的情境中特別
有用，或者當所期望的表現涉及只有人類才具備獨特能力提供的主觀判斷時亦然。

在傳統的強化學習中，代理人與環境互動。每一次互動中，代理人執行一個行動、接收一個觀測，並
得到一個數值獎勵，告訴它在該情境下表現得如何。透過大量這樣的互動，代理人學會最大化累積獎
勵。

相較之下，在基於人類回饋的強化學習中：

1. **人類輸入：** 回饋不是來自預先定義的獎勵函數，而是來自人類評估者，由他們對代理人的
表現提供定性的、主觀的判斷。這些回饋可以有多種形式，例如數值評分、二元偏好訊號、自然語言
回饋，甚至是展示如何改進的示範。

2. **回饋迴圈：** 人類評估者觀察代理人的行動或結果，並即時（或近乎即時）提供回饋。代理
人透過這個迭代的回饋迴圈學習，逐步調整其行為，使之更貼近人類偏好。

3. **獎勵塑形：** 由於原始的人類回饋存在變異性與潛在偏誤，不一定能直接用於學習演算法，
因此可能需要一個獎勵塑形的過程，將人類回饋轉換成一個更穩定、能引導學習的訊號。

4. **基於偏好的 RL：** RLHF 中一種常見的做法是基於偏好的強化學習，也就是透過比較成對的
行動（或結果），並接收人類對於何者較佳的回饋來訓練代理人。代理人從這些成對比較中推斷出一
個獎勵函數，用來引導其行動。

5. **逆向強化學習（IRL）：** RLHF 使用的另一種技術是 IRL，其目標是推斷出能夠解釋人類行
動或決策的底層獎勵函數，然後用該獎勵函數來訓練代理人。

**應用：**

基於人類回饋的強化學習已在以下領域找到應用：

- **機器人學：** 教機器人執行那些難以用預先定義的獎勵函數來描述的任務。
- **遊戲對弈：** 人類回饋可以引導 AI 代理人更好地模仿類似人類的策略或行為。
- **語言與內容生成：** 例如，以提示性的方式引導 AI 模型生成更連貫、更有創意或更有幫助的
內容。
- **推薦系統：** 人類回饋有助於調整並改善提供給使用者的推薦。

**挑戰：**

使用人類回饋會帶來一些特有的挑戰：

1. **可擴展性：** 收集人類回饋既耗時又昂貴，而且難以擴展到複雜或高維度的任務。
2. **偏誤與雜訊：** 人類回饋可能充滿雜訊、不一致且帶有偏誤，導致次佳的學習結果。
3. **對齊：** 要確保強化學習代理人對齊的是人類評估者真正的偏好，而不只是表面的回饋，是
一件困難的事。
4. **安全與濫用：** 使用可能有缺陷的人類回饋，會引發安全與倫理層面的疑慮，尤其是當回饋
流程遭到破壞或被操弄時。

研究人員正積極研究各種技術來緩解這些挑戰並改進 RLHF 方法。其中一種做法是利用機器學習模
型來放大人類回饋的效力，例如：學習從稀疏的人類輸入中進行泛化，或在無法取得直接人類輸入
的情境中合成合理的回饋。
```

DPO 模型的回應包含類似的資訊，因為兩個模型都是從同一個預訓練基礎模型訓練而來，但偏好微調增添了更多結構、格式編排，當然還有長度——而這些已被反覆證明與人們對語言模型的普遍偏好概念相關。想看更多這類範例，請參閱本書附帶的補全範例庫：https://www.rlhfbook.com/library。

## B.1 話多的平衡（The Chattiness Balance）

無數人正使用 RLHF 或偏好微調方法來衝高 AlpacaEval 與其他自動化聊天排行榜的分數（這類排行榜使用 LLM 即評審（LLM-as-a-judge）來近似衡量一個代理人在簡單對話任務上有多麼有幫助、無害且誠實），但 RLHF 在這裡帶來的巨大增益，並沒有在較難被操弄的評測（例如 Arena）上帶來成比例的分數提升。其中的張力在於：雖然 RLHF 方法確實為這些模型帶來可量測的改進，這種訓練卻不一定能轉化為人們真正在意的效能。隨著 RLHF 文獻體系的建立，大批模型以相關方法發布，宣稱用 RLHF 提升了模型的「對齊」程度，但它們往往做得太過火，發表的評測分數從誤導人到毫無意義的都有。

這些以對齊為動機的 RLHF 方法，若做得恰當，會讓模型更好共事、也更令人愉快。這通常伴隨著在 MT Bench 或 AlpacaEval 等評測工具上的明顯進步。

2023 年秋天，關於直接偏好最佳化（Direct Preference Optimization, DPO），以及它相對於近端策略最佳化（Proximal Policy Optimization, PPO）與其他基於 RL 的偏好微調方法所扮演角色的爭論達到高峰——爭論的核心正是聊天評測與真實世界效能之間的平衡（關於這些取捨更技術性的討論，請見第 8 章、Ivison et al. 2024 [125]，或這場演講）。問題在於，你同樣可以把 DPO 與 PPO 這類技術用在回饋迴圈中、或搭配海量資料使用，結果為了換取這種聊天效能，反而嚴重損害模型在數學或程式撰寫等其他任務上的表現。

在 DPO 對上 PPO 的爭論遍地開花期間，出現了許多論文，端出令人難以置信的基準測試成績，卻沒有獲得任何有意義的採用。即使這些論文釋出了模型權重，它們在公開使用上也不受歡迎，因為這些模型在一般使用情境下並不穩健。在 2023 年秋天或其後不久應用 RLHF 時，根本不可能讓一個 70 億參數模型的對齊版本在全面性的基準測試上真正打敗 GPT-4（這類比較的結論會持續成立：當時的小模型無法穩健地打敗最好的大型前沿模型（frontier model））。這看似顯而易見，但總是有論文宣稱做出了這類結果。圖 48 出自一篇名為直接納許最佳化（Direct Nash Optimization, DNO）的論文，該論文主張其模型在 2024 年 4 月的 AlpacaEval 上，在 7B 模型中達到最先進（state-of-the-art）之類的水準 [201]。作為背景說明：DNO 是「獎勵模型＋PPO」（經典 RLHF）或一次性（one-shot）DPO 的一種批次式、同策略（on-policy）的*迭代式*替代方案，它把對齊問題定式為尋找相對於一個偏好預言機（preference oracle）的納許均衡（Nash equilibrium），從而直接最佳化成對偏好（即勝率差距）。當學術誘因與受到整個社會極度關注的技術交會時，這些挑戰便會浮現。

![圖](../webapp/assets/figures/fig-p234-1.png)
*圖 48：直接納許最佳化（DNO）論文中的結果，突顯其小模型勝過了 GPT-4 這一等級的模型。Rosset et al. 2024。授權：CC-BY。*

就連 2024 年 1 月的先驅論文《Self Rewarding Language Models》[297]，也揭露了在 Llama 2 70B 上不切實際的高分。當然，在當時，70B 模型確實能比 7B 模型更接近 GPT-4（如同我們在 2024 年令人印象深刻的 Llama 3 系列發布中所見），但重要的是把模型的實際狀況與現代 RLHF 論文中的宣稱區分開來。這些模型是針對狹窄的測試集調校出來的，在真實使用中，面對它們宣稱擊敗的那些大得多的模型，表現並不耐打。還有更多類似的方法來來去去，既分享了寶貴的洞見、也誇大了成果，使得 RLHF 更難被理解。

被施加了「怪怪的 RLHF」（"funky RLHF"）的模型，其症狀往往是長度偏差（length bias）。這種情況變得太過普遍，以至於 AlpacaEval 與 WildBench 等多個評測系統都內建了線性長度校正機制。這修補了「靠灌話多來『打敗 GPT-4』或當時領先的前沿模型」的誘因，並創造出一種較不易被遊戲化的動態，讓較簡短、實用的模型真正有機會勝出。

無論如何，如今在文獻中，僅僅為了話多而對聊天模型進行對齊，已經帶有些許聲譽上的代價（reputational tax），因為大家已承認這些狹隘的方法可能在其他方面損害模型。以下這段來自 2023 年阿里巴巴最初 Qwen 模型的說明，是早期對齊實驗中被多次觀察到的現象，放大了話多與效能之間的取捨 [407]。

> 我們以大量資料對模型進行了預訓練，並以監督式微調（supervised fine-tuning）與直接偏好最佳化兩者對模型進行了後訓練。然而，DPO 雖帶來人類偏好評估上的進步，卻造成了基準評測上的退步。

把這種取捨處理得當的一個早期好例子，是 2024 年 3 月的 Starling Beta 這類模型 [73]。它是從另一個聊天模型 OpenChat [408] 微調而來的模型（後者其實是由完全另一個組織訓練的）。它的訓練完全聚焦於 k 元比較（k-wise）獎勵模型訓練與 PPO 最佳化，並讓它在 Arena 上的排名上升了 10 名。該模型的平均回應長度增加了，但增加的方式夠好，確實能幫助到人類評分者。較晚的例子如 Olmo 3，文件記載其經歷了大量的聊天訓練，但作者們偏好選擇數學、程式撰寫與推理分數較高的最終模型檢查點（checkpoint），而不是那些在基於 LLM 即評審的聊天基準上分數最高的候選檢查點 [18]。

一個自然的問題是：為什麼 RLHF 會讓模型的回應變長？根本上，Arena 這類評測已經告訴我們：相較於精簡的回應，模型的一般使用者往往更喜歡較長、較完整的答案。對於快速評估回應的使用者來說，較長的答案可能感覺更周全、更有幫助，甚至更值得信賴。這並不代表*每一位*使用者的偏好，但這些模型被訓練來貼合眾多資料標註者的平均偏好，因此 RLHF 往往會讓模型變得更囉嗦。
