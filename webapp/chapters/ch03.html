# 第 3 章　訓練總覽（Training Overview）

> 譯自 Nathan Lambert, *Reinforcement Learning from Human Feedback*（rlhfbook.com），2026-07-01 版，原文第 21–30 頁。

本章先對 RLHF 訓練提供一個概略的總覽，本書稍後才會進入各項細節。RLHF 雖然最佳化的是一個簡單的損失函數（loss function），卻需要依序訓練多個不同的 AI 模型，再將它們串連成一個複雜的線上（online）最佳化流程。

在這裡，我們會介紹 RLHF 的核心目標：在以距離為基礎的正則化項（distance-based regularizer）約束下，最佳化一個代表人類偏好的代理獎勵（proxy reward）（同時說明它與古典 RL 問題的關聯）。接著我們會展示幾個使用 RLHF 打造頂尖模型的經典訓練配方（canonical recipes），說明 RLHF 如何與其餘的後訓練（post-training）方法相互配合。這些範例配方將作為本書後續章節的參照——屆時我們會描述進行 RLHF 時可以做的各種最佳化選擇，並回頭指出不同的關鍵模型在訓練中如何採用了不同的步驟。

## 3.1 問題形式化（Problem Formulation）

基於人類回饋的強化學習（Reinforcement Learning from Human Feedback, RLHF）的最佳化建構在標準 RL 設定之上。在 RL 中，代理人（agent）根據環境狀態 $s_t$，從策略（policy）$\pi(a_t \mid s_t)$ 中採樣動作 $a_t$，以最大化獎勵 $r(s_t, a_t)$ [54]。策略是一個將每個狀態映射到動作機率分布的函數。演變為現代 RLHF 文獻的早期策略屬於所謂的深度強化學習（deep reinforcement learning）——即使用神經網路來學習上述函數。傳統上，環境依照轉移（transition，即動態 dynamics）$p(s_{t+1} \mid s_t, a_t)$ 演化，並具有初始狀態分布 $\rho_0(s_0)$。策略與動態共同誘導出一個軌跡分布（trajectory distribution）。一條軌跡的整體機率，是初始狀態機率、策略所做的每一次動作選擇、以及環境所產生的每一次狀態轉移的乘積：

$$p_\pi(\tau) = \rho_0(s_0) \prod_{t=0}^{T-1} \pi(a_t \mid s_t)\, p(s_{t+1} \mid s_t, a_t). \tag{1}$$

在一個時間視野（horizon）為 $T$ 的有限回合（episode）中，RL 代理人的目標是求解下列最佳化問題，其中 $\gamma$ 是介於 0 到 1 之間的折扣因子（discount factor），用以權衡近期與未來獎勵之間的相對重要性：

$$\max_\pi \; \mathbb{E}_{\tau \sim p_\pi}\left[\sum_{t=0}^{T-1} \gamma^t\, r(s_t, a_t)\right]. \tag{2}$$

給定策略的期望報酬（expected return）通常記為 $J(\pi)$，最佳值寫作 $J^\star = \max_\pi J(\pi)$。

對於持續性任務（continuing tasks），通常令 $T \to \infty$，並依靠折扣（$\gamma < 1$）來確保目標函數是良好定義的。第 6 章將討論最佳化此式的多種方法。

### 3.1.1 簡單範例：溫控器（A Simple Example: The Thermostat）

為了對 RL 的運作建立基本直覺，請想像一個溫控器（thermostat），試圖將房間維持在華氏 70 度（70°F）的目標溫度。在 RL 中，代理人一開始對任務一無所知，必須透過試誤（trial and error）來找出好的策略。溫控器範例包含以下組成要素（各要素如何對應到式 (1) 的軌跡分布，請見圖 5）：

- **狀態（State，$s_t$）**：目前的室溫，例如 65°F。
- **動作（Action，$a_t$）**：將暖氣開啟或關閉。
- **獎勵（Reward，$r$）**：當溫度落在目標的 2 度以內時為 +1，否則為 0。
- **策略（Policy，$\pi$）**：根據目前溫度決定要開啟或關閉暖氣的規則。以下是溫控器可能學到的一種策略；視環境確切的轉移動態而定，它不一定是最佳的：

$$\pi(a_t = \text{on} \mid s_t) = \begin{cases} 1 & \text{if } s_t < 70^\circ\text{F} \\ 0 & \text{otherwise} \end{cases} \tag{3}$$

- **轉移（Transition）**：暖氣開啟時房間變暖，關閉時則變冷。代理人透過其動作影響這些動態，但底層的物理——房間升溫或降溫的速度——不在它的控制範圍內。

![圖](../webapp/assets/figures/fig-p022-2.png)

*圖 5：軌跡分布（式 (1)）中的每一項對應到溫控器 RL 範例。*

一開始，溫控器的策略基本上是隨機的——它不管目前溫度如何，隨意地開開關關暖氣，室溫因此劇烈波動。經過許多回合的試誤之後，代理人發現「房間冷時開暖氣、暖時關暖氣」能帶來更多獎勵，並逐漸收斂到一個合理的策略。這就是 RL 的核心迴圈：觀察狀態、選擇動作、獲得獎勵，並更新策略以隨時間取得更多獎勵。

### 3.1.2 經典 RL 範例：CartPole（Classic RL Example: CartPole）

若要看一個具有連續動態、更豐富的例子，可以考慮經典的 *CartPole*（倒立擺，inverted pendulum）控制任務，它出現在許多 RL 教科書、課程、甚至研究論文之中。溫控器只有單一狀態變數與二元動作，而 CartPole 則涉及四個連續狀態變數以及基於物理的轉移——使其成為 RL 演算法的標準基準測試（benchmark）。

![圖](../webapp/assets/figures/fig-p023-1.png)

*圖 6：CartPole 環境，顯示狀態變數 $(x,\ \dot{x},\ \theta,\ \dot{\theta})$ 與動作 $(\pm F)$。*

- **狀態（State，$s_t$）**：台車的位置／速度與擺桿的角度／角速度：

$$s_t = (x_t,\ \dot{x}_t,\ \theta_t,\ \dot{\theta}_t). \tag{4}$$

- **動作（Action，$a_t$）**：對台車施加向左或向右的水平力，例如 $a_t \in \{-F, +F\}$。
- **獎勵（Reward，$r$）**：一種簡單的獎勵是：只要擺桿保持平衡且台車停留在軌道上（例如 $|x_t| \le 2.4$ 且 $|\theta_t| \le 12^\circ$），每一步 $r_t = 1$；一旦任一界限被違反，回合即終止。
- **動態／轉移（Dynamics / transition，$p(s_{t+1} \mid s_t, a_t)$）**：在許多環境中，動態是確定性的（因此 $p$ 是一個點質量分布 point mass），可透過步長為 $\Delta t$ 的尤拉積分（Euler integration）寫成 $s_{t+1} = f(s_t, a_t)$。標準的簡化 CartPole 更新使用以下常數：台車質量 $m_c$、擺桿質量 $m_p$、擺桿半長 $l$、重力 $g$（$\alpha$ 是具有加速度單位、經質量正規化的中間量）：

$$\alpha = \frac{a_t + m_p l\, \dot{\theta}_t^2 \sin\theta_t}{m_c + m_p} \tag{5}$$

$$\ddot{\theta}_t = \frac{g\sin\theta_t - \cos\theta_t\, \alpha}{l\left(\frac{4}{3} - \frac{m_p \cos^2\theta_t}{m_c + m_p}\right)} \tag{6}$$

$$\ddot{x}_t = \alpha - \frac{m_p l\, \ddot{\theta}_t \cos\theta_t}{m_c + m_p} \tag{7}$$

$$x_{t+1} = x_t + \Delta t\, \dot{x}_t, \quad \dot{x}_{t+1} = \dot{x}_t + \Delta t\, \ddot{x}_t, \tag{8}$$

$$\theta_{t+1} = \theta_t + \Delta t\, \dot{\theta}_t, \quad \dot{\theta}_{t+1} = \dot{\theta}_t + \Delta t\, \ddot{\theta}_t. \tag{9}$$

這是上述一般設定的具體實例：策略選擇 $a_t$，轉移函數推進狀態，而獎勵則在整個回合中累積。

### 3.1.3 調整標準 RL 設定（Manipulating the Standard RL Setup）

RLHF 所用的 RL 形式化被視為一個較不開放的問題：其中 RL 的幾個關鍵組件被設為特定的定義，以配合語言模型。從標準 RL 設定到 RLHF 設定有多項核心變更：表 1 總結了標準 RL 與語言模型所用 RLHF 設定之間的這些差異。

1. **從獎勵函數換成獎勵模型（Switching from a reward function to a reward model）。** 在 RLHF 中，使用的是一個學習而來的人類偏好模型（learned model of human preferences）$r_\theta(s_t, a_t)$（或任何其他分類模型），而不是環境的獎勵函數。這讓設計者在方法的彈性與對最終結果的掌控上大幅提升，但代價是實作的複雜度。在標準 RL 中，獎勵被視為環境的一個靜態組成部分，設計學習代理人的人無法更改或操縱它。
2. **不存在狀態轉移（No state transitions exist）。** 在 RLHF 中，該領域的初始狀態是從訓練資料集中採樣的提示詞（prompt），而「動作」則是對該提示詞的補全（completion）（在標準 RLHF 設定中，提示詞是固定的，模型的補全並不會決定下一個提示詞）。一個提示詞加上一個補全便構成一個完整的回合（episode）或 rollout；而在古典 RL 問題中，這會是許多反覆的狀態—動作、狀態—動作鏈。
3. **回應層級的獎勵且不做折扣（Response-level rewards and no discounting）。** RLHF 的獎勵歸因是針對整個動作序列——由多個生成的 token 組成——一次性完成，而不是以細粒度的方式進行（這種單步結構在 RL 文獻中有時稱為拉霸機問題（bandit problem））。為了讓 RLHF 的 RL 演算法把每個 token 視為同一個動作的一部分，實作上通常使用 $\gamma = 1$ 的折扣因子（即不折扣）；這與標準 RL 不同——標準 RL 以 $\gamma < 1$ 在許多連續決策之間權衡短期與長期獎勵。

表 1：標準 RL 與語言模型 RLHF 的關鍵差異。

| 面向 | 標準 RL | RLHF（語言模型） |
|---|---|---|
| 策略 | 從零開始學習（隨機初始化） | 從預訓練語言模型微調而來 |
| 獎勵訊號 | 環境獎勵函數 $r(s_t, a_t)$ | 學習而來的獎勵／偏好模型 $r_\theta(x, y)$（提示詞 $x$、補全 $y$） |
| 狀態轉移 | 有：動態 $p(s_{t+1} \mid s_t, a_t)$ | 通常沒有：提示詞 $x$ 從資料集中採樣；補全不會決定下一個提示詞 |
| 動作 | 單一環境動作 $a_t$ | 從 $\pi_\theta(\cdot \mid x)$ 採樣的一個補全 $y$（token 序列） |
| 獎勵粒度 | 通常逐步／細粒度 | 通常為針對整個補全的回應層級（拉霸機式），通常不折扣（$\gamma = 1$） |
| 時間視野 | 多步回合（$T > 1$） | 通常為單步（$T = 1$），但多輪對話可建模為較長視野 |

鑑於此問題的單輪（single-turn）性質，最佳化可以改寫為不含時間視野與折扣因子（並使用顯式的獎勵模型）的形式：

$$\max_\pi \; \mathbb{E}_{\tau \sim \pi}\left[r_\theta(s_t, a_t)\right]. \tag{10}$$

就許多方面而言，結果是：儘管 RLHF 深受 RL 最佳化器與問題形式化的啟發，其實際實作與傳統 RL 卻大不相同。

### 3.1.4 微調與正則化（Fine-Tuning and Regularization）

在傳統 RL 問題中，代理人必須從隨機初始化的策略開始學習；但在 RLHF 中，我們是從一個具備許多初始能力的強大預訓練基礎模型出發。RLHF 的這種強先驗（prior）帶來一項需求：必須防止最佳化偏離初始策略太遠。為了在微調（fine-tuning）情境中取得成功，RLHF 技術採用多種類型的正則化（regularization）來控制最佳化過程。目標是讓獎勵最大化仍能發生，同時避免模型陷入過度最佳化（over-optimization），詳見第 14 章的討論。對最佳化函數最常見的修改，是在目前 RLHF 策略與最佳化起點之間的距離上，加入 KL 散度（KL divergence）懲罰項。訓練模型時所設定的超參數 $\beta$ 控制此約束的強度——較大的 $\beta$ 讓模型更貼近其起點，而較小的 $\beta$ 則給予最佳化器更多追逐獎勵的自由：

![圖](../webapp/assets/figures/fig-p026-1.png)

*圖 7：標準 RLHF 迴圈*

$$\max_\pi \; \mathbb{E}_{\tau \sim \pi}\left[r_\theta(s_t, a_t)\right] - \beta\, \mathcal{D}_{\mathrm{KL}}\big(\pi(\cdot \mid s_t)\,\|\,\pi_{\mathrm{ref}}(\cdot \mid s_t)\big). \tag{11}$$

在此形式化之下，許多針對 RLHF 訓練的研究，都聚焦於理解如何運用一定的「KL 預算」（KL budget）——以與初始模型的距離來衡量。更多細節請見第 15 章〈正則化〉。

### 3.1.5 最佳化工具（Optimization Tools）

本書將詳細介紹許多用於求解此最佳化問題的常見技術。後訓練的常用工具包括：

- **獎勵建模（Reward modeling，第 5 章）**：訓練一個模型來捕捉所蒐集的偏好資料中的訊號，之後便能輸出一個純量獎勵，用以指示未來文字的品質。
- **指令微調（Instruction fine-tuning，第 4 章）**：RLHF 的先決條件。模型透過模仿預先挑選的範例，學會當今大多數語言模型互動所使用的問答格式。
- **拒絕採樣（Rejection sampling，第 9 章）**：最基本的 RLHF 技術。由一個模仿人類偏好的獎勵模型，來篩選用於指令微調的候選補全。
- **策略梯度（Policy gradients，第 6 章）**：RLHF 開創性研究範例中所使用的強化學習演算法，用來根據獎勵模型的訊號更新語言模型的參數。
- **直接對齊演算法（Direct alignment algorithms，第 8 章）**：直接從成對偏好資料最佳化策略的演算法，而不是先學習一個中介的獎勵模型、之後再對其進行最佳化。

現代以 RLHF 訓練的模型一律先採用指令微調，接著混合使用其他的最佳化選項。

### 3.1.6 RL 在語言模型後訓練中的微妙優勢（Subtle Advantages of RL in Post-Training Language Models）

在接下來的章節中，我們會介紹許多後訓練的最佳化工具。其中不少——例如拒絕採樣（第 9 章）以及像 DPO 這類直接對齊演算法（第 8 章）——遠比讓 RL 順利運作來得簡單。儘管替代方案如此簡單，基於 RL 的方法仍持續勝出。有些趨勢十分明顯，例如搭配可驗證獎勵的強化學習（reinforcement learning with verifiable rewards, RLVR）所帶來的推論時擴展（inference-time scaling）；但事實證明，RL 是非常適合語言模型的最佳化工具。相較於指令微調或 DPO 類演算法，實作 RL 需要大得多的基礎設施投資；不過，容我用比較口語的說法：它所提供的梯度更新「通常對模型幫助很大」。這很難量化，但會反覆以下列幾種形式出現：

- RL 階段可以「修補」模型的粗糙之處，讓模型更容易對話或更穩健（這可能來自於使用 vLLM 之類的推論工具進行訓練，使其具備數值穩定性）。確切原因在文獻中尚未廣為人知，但其真實性反映在 RL 如今日益普及的事實上。
- RL 可以「外科手術式」地進行——模型很擅長學習提示詞分布落在何處，而且 RL 傾向於不會「壓扁」模型的一般能力。一個好例子是 Tülu 3 僅在數學提示詞上以 RL 訓練，卻能在廣泛的任務組合上維持能力 [6]。

整體而言，語言模型上的 RL 損失函數穩健、可擴展、有效且靈活，開啟了大片新的實驗領域。而最初帶領我們走上這條路的方法，正是 RLHF 的研究工作。

## 3.2 經典訓練配方（Canonical Training Recipes）

隨著時間推移，各種模型被視為 RLHF（或更廣義的後訓練）的經典配方。這些配方反映了當時的資料實務與模型能力。隨著配方逐漸過時，訓練出具有相同特性的模型會變得更容易、所需的資料也更少。整體趨勢是：後訓練涉及愈來愈多的最佳化步驟、使用愈來愈多的訓練演算法，並涵蓋愈來愈多樣的訓練資料集與評估。

### 3.2.1 InstructGPT

在 ChatGPT 剛問世前後，廣為接受的（「經典」）語言模型後訓練方法有三大步驟，其中 RLHF 是核心 [55] [3] [5]。這三個步驟建立在「基礎」（base）語言模型（即在大規模網路文字上訓練的下一個 token 預測模型）之上，總結如下並見圖 8：

1. **在約 1 萬筆範例上進行指令微調（Instruction tuning on ~10K examples）**：這讓模型學會遵循問答格式，並主要從人工撰寫的資料中學到一些基本技能。
2. **在約 10 萬筆成對提示詞上訓練獎勵模型（Training a reward model on ~100K pairwise prompts）**（論文使用 33K 筆提示詞）：此模型從指令微調後的檢查點（checkpoint）訓練而來，捕捉人們希望在最終訓練中建模的多元價值。獎勵模型是 RLHF 的最佳化目標。
3. **在另外約 10 萬筆提示詞上，以 RLHF 訓練指令微調後的模型（Training the instruction-tuned model with RLHF on a separate ~100K prompts）**（論文確切使用 31K 筆，且未記載提示詞是否重複使用自其他階段）：模型以獎勵模型為目標進行最佳化，使用的很可能是另外一組提示詞；模型先對其生成回應，之後再獲得評分。

RLHF 完成後，模型便準備好部署給使用者。這個配方是現代 RLHF 的基石，但如今的配方已大幅演進，包含更多階段與更多資料。

### 3.2.2 Tülu 3

現代版本的後訓練涉及多得多的模型版本與訓練階段（也就是遠超過 Llama 2 所記載的 5 個 RLHF 步驟 [49]）。下方圖 9 展示了一個例子：模型在收斂之前經歷多次訓練迭代。

![圖](../webapp/assets/figures/fig-p028-2.png)

*圖 9：現代多輪後訓練流程的示意圖。*

這個時代及其後所訓練的最複雜模型，並未公開其訓練流程的完整細節。到了 2026 年，ChatGPT 或 Claude 等領先模型都涉及多輪迭代訓練。這甚至可能包括先訓練多個專門模型、再將權重合併（merge）在一起，以得到能勝任多種子任務的最終模型的技術 [56]（例如 Cohere 的 Command A [57]）。

![圖](../webapp/assets/figures/fig-p029-1.png)

*圖 10：Tülu 3 配方的摘要，包含目標技能與多步驟訓練配方。Lambert et al. 2024，授權 CC-BY。*

Tülu 3 是這種多階段後訓練方法中一個完全開放、且 RLHF 扮演要角的例子。Tülu 3 配方由三個階段組成：

1. **在約 100 萬筆範例上進行指令微調（Instruction tuning on ~1M examples）**：這個以合成資料為主的資料集，取自 GPT-4o 與 Llama 3.1 405B 等前沿模型的混合輸出，教導模型一般性的指令遵循，並作為數學與程式撰寫等能力的基礎。
2. **在約 100 萬組偏好對上使用 on-policy 偏好資料（On-policy preference data on ~1M preference pairs）**：此階段大幅提升模型的對話能力（chattiness）（例如 Arena（前身為 ChatBotArena）或 AlpacaEval 2 的表現），同時也改善前述指令微調階段中提到的技能。
3. **在約 1 萬筆提示詞上進行可驗證獎勵的強化學習（Reinforcement Learning with Verifiable Rewards on ~10K prompts）**：此階段是一次小規模的強化學習訓練，用來提升數學等核心技能，同時維持整體效能（如今被視為 DeepSeek R1 等現代推理模型的先聲）。

這個配方已成功應用於 Llama 3.1 [6]、OLMo 2 [58] 與 SmolLM 系列模型 [59]。

### 3.2.3 DeepSeek R1

隨著推理語言模型（reasoning language models）——例如 OpenAI 的 o1——的興起，後訓練的最佳實務再次演進，重新排序並重新分配各訓練階段之間的運算資源。推理模型後訓練配方中記載最清楚的是 DeepSeek R1 [15]；阿里巴巴較大的 Qwen 3 模型（即僅 32B 與 225B MoE 模型）[60]，或小米的 MiMo 7B [61]，也仿效了此做法。DeepSeek 配方如下：

1. **以 10 萬筆以上的 on-policy 推理樣本進行「冷啟動」（"Cold-start" with 100K+ on-policy reasoning samples）**：這些資料採樣自較早的 RL 檢查點 R1-Zero，並經過大量過濾，用以在 DeepSeek-V3-Base 上灌注特定的推理過程。DeepSeek 使用「冷啟動」一詞來描述 RL 如何從少量監督資料中學習。
2. **大規模強化學習訓練（Large-scale reinforcement learning training）**：此階段讓模型反覆處理推理問題，在多種基準測試上執行 RLVR「直到收斂」。
3. **拒絕採樣與 SFT（Rejection sampling and SFT）**：接近收斂時，他們對 RL 檢查點套用拒絕採樣，建立一個約 80 萬筆樣本的 SFT 資料集，然後在大約 3/4 推理問題與 1/4 一般查詢的過濾混合資料上微調模型，以產生一個通用模型。
4. **混合式強化學習訓練（Mixed reinforcement learning training）**：在推理問題（可驗證獎勵）上，搭配一般偏好調校的獎勵模型，對模型做最後的打磨。

如同前文，這個配方也存在各種演進，特別是在步驟 3 與 4——即在將模型開放給使用者之前完成最終定稿的階段。許多模型一開始就使用量身打造的指令資料集，其中包含從既有模型大量過濾與打磨而來的思維鏈（chain-of-thought）序列，讓模型只靠 SFT 就能快速達到強大的行為表現，之後才進入 RL 階段 [62]。
