# 第 16 章　評估（Evaluation）

> 譯自 Nathan Lambert, *Reinforcement Learning from Human Feedback*（rlhfbook.com），2026-07-01 版，原文第 184–192 頁。

評估（evaluation）是一組用來理解本書所述訓練流程之品質與影響的技術。評估通常以基準（benchmark）的形式呈現（常見基準的例子包括 MMLU、GPQA、SWE-Bench、MATH 等），這些基準是一組離散的問題集或環境，設計來衡量模型的某項特定性質。評估是一種持續演進的方法論，因此我們將呈現 RLHF 領域中評估的近期各個「季節」，以及那些會延續到語言模型建模未來的共同主題。理解語言模型評估——尤其是後訓練（post-training）階段的評估——的關鍵在於：當前流行的評估體制，其實反映了流行的訓練最佳實務與目標。雖然具挑戰性的評估會推動語言模型進入新的領域，但大多數評估的設計目的，是為新模型建立有用的訊號。

在許多方面，本章的設計是呈現 RLHF 早期歷史中各種流行評估體制的縮影（vignettes），讓讀者能夠理解其中的共同主題、細節與失效模式。

RLHF 與後訓練的評估在其早期歷史中經歷了幾個明顯不同的階段：

1. **早期聊天階段（Early chat-phase）**：早期以 RLHF 或偏好微調（preference tuning）訓練的模型，其目標評估聚焦於捕捉模型的聊天表現，特別是相對於已知的強大模型（如 GPT-4）而言。早期的例子包括 MT-Bench [78]、AlpacaEval [79] 與 Arena-Hard [80]。這些基準以「LLM 作為評審」（LLM-as-a-judge）取代人類評估者，使用像 GPT-4 這樣的模型來為回應評分——這是一種擴展人類評估標準的高性價比方式（見第 12 章）。當時模型的評估範圍狹窄，而這些領域如今被視為「聊天（chat）」或「指令遵循（instruction following）」領域。
2. **多技能時代（Multi-skill era）**：隨著時間推移，普遍的實務確立了 RLHF 可以用來提升聊天以外的更多技能。舉例來說，Tülu 評估套件涵蓋了知識類任務（MMLU [359]、PopQA [360]、TruthfulQA [361]）、推理類（BigBenchHard [362]、DROP [363]）、數學類（MATH [364]、GSM8K [76]）、程式撰寫類（HumanEval [365]、HumanEval+ [366]）、指令遵循 [260]，以及安全性（由多項評估組合而成）。這反映了後訓練被擁抱為一種超越安全與聊天、面向多方面的解決方案的領域。
3. **推理與工具（Reasoning & tools）**：後訓練的當前時代，其定義是聚焦於具挑戰性的推理與工具使用問題。這些包括困難得多的知識密集型任務，如 GPQA Diamond [367] 與 Humanity's Last Exam [368]；複雜精細的軟體工程任務，如 SWE-Bench+ [369] 與 LiveCodeBench [370]；或以近年 AIME 競賽為代表的高難度數學問題。

在此之外，新的領域仍將持續演化。隨著 AI 越來越成為一個工業化的領域，評估的誘因正在轉變，並變得多方利害關係人化（multi-stakeholder）。自 ChatGPT 發布以來，私有評估（如 Scale Leaderboard [371]）、社群驅動的評估（如 Arena [258]），以及第三方評估公司（如 Artificial Analysis 與 Epoch AI）不斷激增。在本章中，我們將納入對應這些評估如何被實作與理解的細節。

## 16.1 提示格式（Prompting Formatting）

**提示（Prompting）**語言模型本身是一個簡單的動作，也是相當自然的行為，但它同時被視為一門可以練習與精進的技藝或藝術 [372]。提示（prompt）是為語言模型組織資訊與脈絡（context）的方式。對於常見的互動而言，提示相對基本。對於進階情境，一個精心設計的提示可能決定某個特定一次性使用案例的成敗。

在評估方面，提示技巧可以對模型的表現產生重大影響。某些提示技巧——例如下文討論的格式化（formatting）——可能使模型的表現從 60% 掉到接近 0。同樣地，改變提示可以在訓練期間幫助模型學得更好。通俗地說，把模型提示得好，可以帶來如同使用未來模型般的主觀體驗，解鎖超出正常使用範圍的效能。

提示所帶來的增益，通常小於改善資料或訓練演算法等核心領域，但在最終產品中仍可能相當可觀。更重要的啟示是：當你訓練一個強大的、領先的模型時，把它弄壞並使效能暴跌，比找到多一點點效能要容易得多。

用現代語言模型好好地提示，可能涉及準備一整份供模型回應的報告（往往包含數千個 token 的生成文字）。這種行為模式，是語言模型效能衡量與理解方式的諸多變化所帶來的下游結果。

### 16.1.1 少樣本提示與對數似然評分（Few-Shot Prompting and Log-Likelihood Scoring）

早期的語言模型只被當作智慧型的自動補全（autocomplete）工具使用。為了以更開放的方式使用這些模型，人們會先向模型展示多個範例，接著給出一個不完整片語形式的提示。這被稱為少樣本學習（few-shot learning）或情境內學習（in-context learning）[63]，而當時指令微調（instruction tuning）或 RLHF 尚未參與其中。以流行的評估來說，形式如下：

```
# Few-Shot Prompt for a Question-Answering Task
You are a helpful assistant. Below are example interactions to guide your style:

### Example 1
User: "What is the capital of France?"
Assistant: "The capital of France is Paris."

### Example 2
User: "Who wrote the novel '1984'?"
Assistant: "George Orwell wrote '1984.'"

# Now continue the conversation using the same style.
User: "Can you explain what a neural network is?"
Assistant:
```

*（範例說明：這是一個問答任務的少樣本提示。開頭告知模型「你是一個樂於助人的助理」，接著給出兩個範例互動——「法國的首都是什麼？」「法國的首都是巴黎。」以及「小說《1984》的作者是誰？」「喬治・歐威爾寫了《1984》。」——最後要求模型以相同風格回答新問題「你能解釋什麼是神經網路嗎？」）*

在這裡，有多種方式可以評估答案。如果我們考慮一個 MMLU 風格的問題，模型必須在多個答案之間做選擇：

```
# Few-Shot Prompt

Below are examples of MMLU-style questions and answers:

### Example 1
Q: A right triangle has legs of lengths 3 and 4. What is the length of its hypotenuse?
Choices:
(A) 5
(B) 6
(C) 7
(D) 8

Correct Answer: (A)

### Example 2
Q: Which of the following is the chemical symbol for Sodium?
Choices:
(A) Na
(B) S
(C) N
(D) Ca

Correct Answer: (A)

### Now answer the new question in the same style:

Q: Which theorem states that if a function f is continuous on a closed interval [a,b],
then f must attain both a maximum and a minimum on that interval?
Choices:
(A) The Mean Value Theorem
(B) The Intermediate Value Theorem
(C) The Extreme Value Theorem
(D) Rolle's Theorem

Correct Answer:
```

*（範例說明：這是 MMLU 風格的少樣本提示。範例 1 問「一個直角三角形的兩股長為 3 與 4，斜邊長是多少？」正確答案為 (A) 5；範例 2 問「下列何者是鈉的化學符號？」正確答案為 (A) Na；最後要求模型以相同格式回答新問題「哪個定理指出：若函數 f 在閉區間 [a,b] 上連續，則 f 必在該區間上同時達到最大值與最小值？」選項為 (A) 均值定理、(B) 中間值定理、(C) 極值定理、(D) 羅爾定理。）*

要讓語言模型在這裡給出答案，可以依照某些取樣參數生成一個 token，然後檢查答案是否正確——A、B、C 或 D（上述格式如 [373] 所提出的形式），也可以檢視每個 token 的對數機率（log-probabilities），並在正確答案的機率較高時將該任務標記為正確。

讓我們稍微深入探討這些評估細節。前者在單次嘗試時通常稱為精確匹配（exact match），在彙總多個樣本時稱為多數決投票（majority voting）（pass@k 是程式撰寫評估中測試功能正確性時的類比指標）；後者的方法則稱為（條件式）對數似然（log-likelihood）評分，其中條件是提示本身。核心差異在於：從底層機率分布取樣本質上會引入隨機性，而模型輸出於其 token 上的對數機率是靜態的（忽略微小的數值差異時）。

對數似然評分有兩種潛在的實作方式——第一種是檢視字母「(A)」的機率，第二種是檢視答案文字「The Mean Value Theorem」的機率。兩者都是可接受的指標，但預測答案的字母，遠比預測一個完整的、可能跨越多個 token 的答案機率來得簡單。對數似然評分在預訓練（pretraining）評估中較常見，因為此時模型缺乏精確匹配所需的問答格式；而精確匹配則是後訓練的標準做法 [18]。

精確匹配有不同的問題，例如需要固定的格式後綴（如 `The answer is:`），或使用正規表示式（regular expressions）在生成文字中的任意位置偵測答案（例如尋找 `(C)` 或答案字串本身）。如果評估格式與模型的生成方式不匹配，分數可能暴跌。語言模型的評估最好在格式不構成瓶頸的情況下進行，如此才能測試模型的完整能力。實現格式無關（format-agnostic）的評估需要大量的努力與反覆調校才能做對，而這在實務上相當罕見。

回到評估的歷史。無論使用上述哪種設定，少樣本提示的一個常見挑戰是模型不遵循格式，而這會被計為錯誤答案。在設計評估領域時，情境內（in-context）使用的範例數量通常被視為一個設計參數，範圍從 3 到 8 個或更多。

### 16.1.2 思維鏈提示（Chain-of-Thought Prompting）

在少樣本提示的演進過程中，出現了納入思維鏈（chain-of-thought）範例供模型仿效的想法。其形式是：情境內範例中包含寫出來的推理過程，如下所示（這種做法後來被明確提示模型生成推理步驟的方式所取代）[374]：

```
# standard prompting
Q: Roger has 5 tennis balls. He buys 2 more cans of tennis balls. Each can has 3 tennis
balls. How many tennis balls does he have now?

A: The answer is 11.

Q: The cafeteria had 23 apples. If they used 20 to make lunch and bought 6 more, how
many apples do they have?

A: The answer is ...

# chain-of-thought prompting
Q: Roger has 5 tennis balls. He buys 2 more cans of tennis balls. Each can has 3 tennis
balls. How many tennis balls does he have now?

A: Roger started with 5 balls. 2 cans of 3 tennis balls each is 6 tennis balls. 5 + 6 =
11. The answer is 11.

Q: The cafeteria had 23 apples. If they used 20 to make lunch and bought 6 more, how
many apples do they have?

A: The cafeteria had 23 apples originally. They..
```

*（範例說明：上半部是標準提示——問「Roger 有 5 顆網球，又買了 2 罐網球，每罐有 3 顆，他現在共有幾顆？」範例答案直接寫「答案是 11」；下半部是思維鏈提示——範例答案改為寫出推理過程「Roger 一開始有 5 顆球。2 罐、每罐 3 顆網球共 6 顆。5 + 6 = 11。答案是 11。」如此一來，模型在回答新問題「餐廳原本有 23 顆蘋果，用了 20 顆做午餐，又買了 6 顆，現在有幾顆？」時，也會先寫出推理步驟「餐廳原本有 23 顆蘋果。他們……」）*

### 16.1.3 零樣本指令遵循（Zero-Shot Instruction Following）

隨著時間推移，語言模型變得更強，評估也演進為零樣本（zero-shot）評估，亦即所謂的「零樣本學習者（zero-shot learners）」[65]。Finetuned Language Net（FLAN）證明了在特定任務上微調的語言模型——作為現代指令微調的先驅——能夠泛化到它們未曾訓練過的零樣本問題 [65]（T0 [66] 也有類似的發現）。這是指令微調（instruction fine-tuning, IFT）的興起，它是 RLHF 與後訓練的重要先驅。一個零樣本問題看起來會像這樣：

```
User: "What is the capital of France?"
Assistant:
```

*（範例說明：使用者直接問「法國的首都是什麼？」不提供任何範例，等待助理作答。）*

從 2022 年的這個時間點開始，時間軸開始納入早期 RLHF 的關鍵作品，例如 InstructGPT。伴隨這些模型而來的核心能力與使用案例轉變，是更加開放式的使用。隨著使用方式更開放，透過從模型取樣進行評估的做法日益流行，因為它反映了實際的使用情況——技術上，這可以稱為基於生成的（generation-based，精確匹配）評估，但它並沒有那麼明確的公認術語。在 ChatGPT 之後直到近幾年的這段期間，一些多選題評估仍被用於 RLHF 研究，因為任何朝向共同實務的轉變都需要相當長的時間才會展開，通常是一年以上（例如這類評估的做法是：將溫度（temperature）設為零，並取樣字元 A、B、C 或 D）。

### 16.1.4 推理時代的評估提示（Reasoning-Era Evaluation Prompts）

隨著 2024 年底與 2025 年初推理模型（reasoning models）的興起，模型行為的一項重大變化，是在每個答案之前加入一段長的思維鏈（Chain-of-Thought, CoT）推理過程。這些模型不再需要以 [375] 所提出的經典語句「think step by step」（一步一步思考）來提示。評估實務的下一階段演進，是搭配思維鏈推理的基於生成（精確匹配）評估（因此為了最佳效能，幾乎總是使用大於零的溫度）。

舉例來說，在某些設定中，每個問題或類別都有專門設計的提示，以協助從模型中引出行為。Tülu 3 是一篇早期的重要論文，詳細記錄了一些用於多選題 CoT 作答的提示 [6]。以下是一個用於 MMLU 的範例提示，MMLU 是從單一 token 答案取樣過渡到長篇 CoT 搭配精確匹配答案檢查的評估之一。

```
Answer the following multiple-choice question by giving the correct answer letter in
parentheses.
Provide CONCISE reasoning for the answer, and make sure to finish the response with
"Therefore, the answer is (ANSWER_LETTER)" where (ANSWER_LETTER) is one of (A), (B),
(C), (D), (E), etc.

Question: {question}
(A) {choice_A}
(B) {choice_B}
(C) ...

Answer the above question and REMEMBER to finish your response with the exact phrase
"Therefore, the answer is (ANSWER_LETTER)" where (ANSWER_LETTER) is one of (A), (B),
(C), (D), (E), etc.
```

*（範例說明：此提示要求模型以括號中的正確答案字母回答多選題，提供「簡潔的」推理，並務必以「Therefore, the answer is (答案字母)」這個精確片語結束回應，其中答案字母是 (A)、(B)、(C)、(D)、(E) 等其中之一。中間以模板變數 {question}、{choice_A}、{choice_B} 等代入題目與選項，結尾再次提醒模型記得以該精確片語作結。）*

這一點——尤其是當模型使用特殊格式將思考 token 與答案 token 分開時——促成了評估體制最近一次的重大更新。評估正朝向以下方向發展：以搭配思維鏈提示的生成式方式來測試模型的回應。

## 16.2 為何許多外部評估比較並不可靠（Why Many External Evaluation Comparisons Are Unreliable）

AI 公司模型發表公告中的語言模型評估，只能與其他新聞稿在很大的誤差範圍（error bars）下互相比較——也就是說，稍微好一點或差一點的模型應被視為相當——因為他們各自內部用於評估的流程，既未跨模型受控，也未被明確記錄。舉例來說，在 Olmo 3 專案中，作者發現在推理模型時代，大多數後訓練評估在評估設定保持恆定的情況下，標準差介於 0.25 到 1.5 分之間 [18]——而使用不同的提示或取樣參數可能帶來更大的分數變化。各實驗室在訓練期間會對評估進行「爬山」（hillclimb），以使模型更有用，傳統上混合使用訓練集、開發集（development set，又稱驗證集 validation set）與保留評估集（held-out evaluation sets，又稱測試集 test set）。爬山（hillclimbing）是一個口語化的術語，用來描述讓模型在一組目標基準上逐步變好的實務。對於社群用來比較領先模型的公開評估而言，無從得知哪些被用於訓練、哪些被保留用於測試。

隨著評估分數成為企業行銷方案的核心組成，它們在公司內部的實作方式已經漂移。有傳言指出主要 AI 實驗室對 GSM8K 或 MATH 等重要評估使用「客製提示（custom prompts）」。這些做法演變得很快。

語言模型評估堆疊（evaluation stack）之所以被視為行銷，是因為這些評估沒有堅實的真值來源（source of truth）。前沿實驗室內部正在發生的事情是：評估套件被調校以符合他們的內部需求。當結果被分享出來時，我們得到的是實驗室對其模型所得數字形式的輸出，而不是該函數的所有輸入。這些輸入是非常敏感的配置，而 OpenAI、Meta、Anthropic 與 Google 的配置全都不同。即使是完全開放的評估標準，也很難保證可重現性。將力氣集中在你自己的模型上，是接近可重複評估技術的唯一途徑。行銷的背後有著良善的意圖，起點正是各家的技術團隊。

比較多個實驗室評估時的另一個混淆例子，是推論時擴展（inference-time scaling）被加入評估比較之中。推論時擴展顯示，模型可以透過在推論時使用更多 token 來提升效能。因此，以推論所用的總 token 數來控制評估分數是重要的，但這尚未成為普遍的實務。

依據你在後訓練中資料的格式化方式，模型在不同評估格式間會有顯著差異。舉例來說，兩個流行的開放數學資料集 NuminaMath [376] 與 MetaMath [377] 在訓練中彼此衝突，原因是答案格式的細微差異——Numina 將答案放在 `\boxed{XYZ}` 中，而 MetaMath 將答案放在 `The answer is: XYZ` 之後——同時在兩者上訓練，可能比只用其中一個的表現更差。強大的模型被訓練成能夠應付多種格式，但它們通常仍有一個最強的格式。

最終，關於封閉模型評估的現狀，我們剩下幾個關鍵要點：

- 我們不知道、也不一定擁有各實驗室正在爬山的關鍵測試集，因此某些評估只是代理指標（proxies）。
- 前沿模型的推論正因特殊系統提示、特殊 token 等而變得更加複雜，而我們不知道這如何影響評估；以及
- 我們不知道用於數值化回報封閉評估的所有格式與細節。

所有這些動態，加上過去幾年 AI 模型的極速進展，造就了類似圖 45 的著名圖表：每個時代的當紅基準都很快被解決。在單一基準層級描述這種動態的常用術語是飽和（saturation）。當每個基準接近 100% 時，模型的進展開始放緩，因為只剩下更難的（或者在許多情況下，標註錯誤的）資料點，這使得它作為訓練進展（或兩個模型間比較）的衡量標準變得較不可靠。

## 16.3 實驗室內部實際如何運用評估來改進模型（How Labs Actually Use Evaluations Internally to Improve Models）

如今，前沿語言模型的評估既是科學，也同樣是一門藝術；若要精確描述不同團隊如何運用評估來理解最先進的語言模型，那將足以寫成另一本教科書。

不同的團隊選擇不同的評估來保持其獨立性——亦即使它們成為真正的測試集——但沒有人揭露自己選了哪些。舉例來說，流行的推理評估 MATH 與 GSM8K 都有訓練集，其提示可以輕易用來提升效能。使用來自同一分布的提示來提升效能，與透過在一般數學資料上訓練而泛化到這些任務，是非常不同的兩件事。

事實上，這些*訓練集*包含非常高品質的資料，因此模型在其上訓練會有所受益。如果這些公司*並未*將對應的評估作為追蹤的核心指標，那麼在評估集上訓練可能是務實的決定，因為高品質資料是模型開發的主要限制因素。

領先的 AI 實驗室透過聚焦於少數關鍵評估來爬山，並在最後於核心公開集上回報分數。關鍵在於，他們用於追蹤進展的某些評估——例如 GPT-4 報告 [378] 中用於擴展律（scaling）交叉熵損失預測的資料集——往往並不公開。

後訓練的評估與人工評估（human evaluation）高度相互依存。生成式語言模型的人工評估會產生 Elo 排名（在 Anthropic 早期的論文中很流行，例如 Constitutional AI），而對獎勵模型（reward models）的人工評估則顯示出一致性（agreement）。這些也可以透過 A/B 測試視窗向使用者提供兩個不同的模型來取得（如偏好資料一章所討論的）。

他們選擇聚焦的那組有限的評估，在評估與訓練之間形成了緊密的連結。曾有一段時間，關注焦點的評估是 MMLU。GPQA 在推理模型崛起期間極為流行，因為社群對科學能力的關注增加。實驗室會修改評估，使其更符合自身需求，例如 OpenAI 發布 SWE-Bench-Verified [379]。每個前沿實驗室還建置或購買了許多公眾無法取得的內部評估。

在內部改進評估對下游訓練的關鍵作用是：**提升比較訓練運行（training runs）時的統計檢定力（statistical power）**。透過更換評估，這些實驗室降低了其優先訊號上的雜訊，以做出更明智的訓練決策。

現代語言模型訓練堆疊中後訓練的複雜化，使這一點更加突出。如今評估語言模型涉及中等數量的 token 生成（而不只是檢視答案的對數機率），因此也涉及運算開銷。前沿實驗室在許多任務上使用小技巧來提升表現，是被普遍接受的事實——最常見的解釋是針對特定評估使用一次性的提示（one-off prompts）。

## 16.4 資料污染（Contamination）

當前語言模型實務（即不限於 RLHF 與後訓練）的一個重大問題，是有意或無意地在訓練中使用了評估資料集的資料。這被稱為資料集污染（dataset contamination）（是資料洩漏（data leakage）的一種形式），而相應地，避免它的實務稱為去污染（decontamination）。要對資料集去污染，需要在訓練與測試資料集之間進行搜尋，尋找詞或子詞 token 上的 n-gram 重疊匹配，或固定長度的字元子字串匹配（例如 50 個字元）[380]。資料可能被污染的途徑有很多，但最常見的是在多個階段從網路爬取訓練資料。基準往往被列在會被爬取的公開網域上，或者使用者將問題輸入模型，而這些問題後來可能進入未來模型的候選訓練資料。

舉例來說，在對 Tülu 3 的評估套件進行去污染時，作者發現流行的開放資料集受到 RLHF 流行評估的污染 [6]。這些重疊包括：UltraFeedback 受 TruthfulQA 污染、Evol-CodeAlpaca 受 HumanEval 污染、NuminaMath 受 MATH 污染，以及 WildChat 受安全性評估污染。這些是透過訓練提示與評估集中精確提示之間的 8-gram 重疊找到的。

在其他情況下，模型被發現曾在與基準非常接近的資料上訓練，例如保持數學問題的文字不變、只更換數字。這可能導致後訓練體制中的異常行為，例如當模型以隨機獎勵（random rewards）進行 RL 訓練時基準分數竟然提升——這是一種人為設計的設定，唯有當模型存在某些類型的資料污染時，才應該會提升效能。這種基礎模型污染（base model contamination）——無法確切證明模型為何有特定行為——一直是許多建立在 Qwen 2.5 與 Qwen 3 基礎模型之上的早期 RLVR 研究的重大混淆變數（confounding variable）[186] [381]。

為了理解那些不揭露或不釋出訓練資料的模型的污染狀況，人們建立了基準的新版本，其中包含從原版稍加擾動（perturbed）的問題（例如 MATH 的 [382]），以便觀察哪些模型被訓練成匹配原始格式或問題。在這些擾動基準上的高變異數並不是污染的證實——污染很難證明。反而，它可能顯示模型是以某種特定格式為前提訓練的，而該格式可能無法轉化為真實世界的效能。

## 16.5 工具（Tooling）

有許多開源的評估工具可供人們選擇。其中包括：

- 英國安全研究院（UK Safety Institute）的 Inspect AI [383]、
- HuggingFace 的 LightEval [384]，它驅動了 Open LLM Leaderboard [385]、
- EleutherAI 的評估框架（evaluation harness）[386]，建立在他們 GPT-Neo-X 模型的基礎設施之上（其中包含一套良好的 GPT-3 時代評估設定與配置）[387]、
- Ai2 基於 OLMES 的函式庫 [388]、
- 史丹佛基礎模型研究中心（Stanford's Center for Research on Foundation Models）的 HELM [389]、
- Mosaic（現為 Databricks）的 Eval Gauntlet [390]，等等。
