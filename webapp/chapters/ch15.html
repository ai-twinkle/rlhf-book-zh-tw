# 第 15 章　正則化（Regularization）

> 譯自 Nathan Lambert, *Reinforcement Learning from Human Feedback*（rlhfbook.com），2026-07-01 版，原文第 175–183 頁。

在本書中，我們已經學到許多修改模型的工具，讓模型能從人類偏好、可驗證獎勵（verifiable rewards）以及其他有價值的訊號中學習。我們使用的所有方法都非常強大，可能導致模型相對於前一個訓練階段那個強大、通用的模型（通常稱為參考模型（reference model））改變過多。當模型從某個給定的獎勵中學得太多，造成分布外（out-of-distribution）表現下降時，這就稱為「過度最佳化」（over-optimization）（如前一章所討論）。

在整個 RLHF 最佳化過程中，會使用許多正則化步驟來防止對獎勵模型的過度最佳化。在這些情境中，過度最佳化看起來就像是輸出無意義文字的模型。一些最佳化「脫軌」的例子包括：模型輸出看似可依循的數學推理、答案卻錯得離譜，或是重複文字、切換語言、出現過多特殊字元。本章涵蓋用來控制模型最佳化的各種方法。

截至 2026 年，大多數 RLHF 實作所採用的最流行變體，是在生成樣本上計算從目前策略到參考策略的 KL 距離（KL distance）。「KL 距離」是在訓練過程中表達*最佳化距離*（optimization distance）的口語說法，儘管 KL 散度（KL divergence）——用來衡量兩個機率分布之間差異的底層數學方法——並不滿足真正距離度量（distance metric）所需的形式性質（把這個數字稱為距離，只是比稱它為分布差異的數值度量來得方便）。許多其他正則化技術曾在文獻中出現，隨後又在該研究路線的下一次模型迭代中消失。也就是說，核心的生成 KL 距離之外的正則化，通常是用來穩定實驗設定，而這些設定在下一代往往可以被簡化。儘管如此，理解在 RLHF 中約束最佳化的工具仍然很重要。

*本章中，我們用 $x$ 表示提示（prompt）、$y$ 表示補全（completion）。這種記號在語言模型文獻中很常見，因為這些方法是作用於完整的提示–補全對，而非個別詞元（token）。*

在具有獎勵模型 $r_\theta$ 的 RLHF 框架中使用時，一般形式如下：

$$r = r_\theta - \lambda r_{\text{reg.}} \tag{138}$$

其參考實作為：

$$r = r_\theta - \lambda_{\text{KL}} \mathcal{D}_{\text{KL}} \left( \pi_{\text{RL}}(y \mid x) \,\|\, \pi_{\text{ref}}(y \mid x) \right) \tag{139}$$

## 15.1 RL 最佳化中的 KL 散度（KL Divergence in RL Optimization）

數學定義請參見附錄 A「定義」。KL 散度衡量的是一個機率分布偏離另一個分布的程度——當 KL 為零時，兩個分布會產生完全相同的輸出。回顧其定義如下：

$$\mathcal{D}_{\text{KL}}(P\|Q) = \sum_{x \in \mathcal{X}} P(x) \log\left(\frac{P(x)}{Q(x)}\right) \tag{140}$$

在 RLHF 中，我們關心的兩個分布通常是新模型版本的分布（例如 $P(x)$）與參考策略的分布（例如 $Q(x)$）。不同的最佳化器會使用不同的 KL 方向。本書通篇使用的最常見「KL 懲罰」（KL Penalty），稱為對參考策略的反向 KL（reverse KL）。實務上，這可以簡化為一個蒙地卡羅估計（Monte Carlo estimate）：從 RL 模型取樣詞元，再由參考模型計算其機率。直觀來說，這種反向 KL 具有一個數值性質：當新模型 $P$（或 $\pi_{\text{RL}}$）將大量機率質量放在原始參考模型指派低機率的區域時，就會施加很大的懲罰。

另一個 KL 方向在機器學習中仍然常被使用，例如某些 RL 演算法內部的信賴區域（trust region）計算。這種懲罰直觀上懲罰的是：新模型的更新*沒有*將機率指派給 $Q$（或 $\pi_{\text{ref}}$）中的高概度（high-likelihood）區域。這更接近於蒸餾（distillation）或行為複製（behavioral cloning）所使用的目標。

### 15.1.1 參考模型到生成內容（Reference Model to Generations）

KL 懲罰最常見的實作方式，是比較訓練期間生成的詞元與一個靜態參考模型之間的距離。其直覺是：你所訓練的出發模型具有一種你希望保持接近的風格。這個參考模型通常是指令微調（instruction tuned）模型，但也可以是先前的 RL 檢查點（checkpoint）。透過簡單的代換，我們取樣的模型就變成 $\pi_{\text{RL}}(x)$ 與 $\pi_{\text{ref}}(x)$，如上方公式 139 所示（在標準定義中通常寫作 $P$ 與 $Q$，套用於 RL 的 KL 懲罰時）。這樣的 KL 散度懲罰早在大型語言模型流行之前，就已被應用於對話代理人（dialogue agents）[354]，而 KL 控制也很快確立為微調預訓練模型的核心技術 [355]。

### 15.1.2 實作範例（Implementation Example）

實務上，KL 散度的實作經常採用近似 [126]，使實作簡單許多。根據上述定義，當直接從分布 $P$ 取樣時，KL 的加總可以轉換為期望值（這裡的 $x$ 是樣本空間上的一般隨機變數，而非本書其他地方使用的提示記號）。在這種情況下，$P$ 是目前正在訓練之模型的生成分布（也就是說，不是參考模型）。此時，KL 散度的計算改為如下：

$$\mathcal{D}_{\text{KL}}(P \,\|\, Q) = \mathbb{E}_{x \sim P} \left[ \log P(x) - \log Q(x) \right]. \tag{141}$$

這種基於樣本的形式在實作上簡單得多，特別是在直接處理語言模型訓練中頻繁使用的對數機率（log probabilities）時。

```python
# 步驟 1：generate() 以自迴歸方式逐詞元取樣出完整序列
generated_tokens = model.generate(inputs)

# 步驟 2：forward() 對序列做單次前向傳遞，取得逐詞元 logits（不取樣）
logits       = model.forward(generated_tokens[:, :-1]).logits
ref_logits   = ref_model.forward(generated_tokens[:, :-1]).logits

# 步驟 3：將 logits 轉為對數機率
logprobs     = F.log_softmax(logits, dim=-1)
ref_logprobs = F.log_softmax(ref_logits, dim=-1)

# 步驟 4：擷取每個模型指派給實際生成之詞元的機率
token_logprobs     = logprobs.gather(-1, generated_tokens[:, 1:].unsqueeze(-1)).squeeze(-1)
ref_token_logprobs = ref_logprobs.gather(-1, generated_tokens[:, 1:].unsqueeze(-1)).squeeze(-1)

# 步驟 5：加總得到序列層級的對數機率；其差值即為 KL 的近似
seq_logprob     = token_logprobs.sum(dim=-1)
ref_seq_logprob = ref_token_logprobs.sum(dim=-1)

kl_approx = seq_logprob - ref_seq_logprob
kl_full   = F.kl_div(ref_logprobs, logprobs, reduction='batchmean')
```

一些實作範例包括 TRL 以及 Hamish Ivison 的 Jax 程式碼。

## 15.2 隱式正則化（Implicit Regularization）

本章其他小節描述的是*顯式*（explicit）正則化：KL 懲罰、預訓練梯度（pretraining gradients）與間距損失（margin losses），這些都是實務工作者刻意加入訓練目標的項目。愈來愈多的實證研究顯示，基於 RL 的後訓練（post-training）也提供了*隱式*（implicit）正則化——一種對記憶化（memorization）與災難性遺忘（catastrophic forgetting）的內建抵抗力，源自 on-policy 最佳化本身的結構。這是損失更新的本質使然，即使不使用任何用來控制 RL 訓練的顯式工具（例如 KL 懲罰或重播緩衝區（replay buffers））也是如此。

### 15.2.1 SFT 記憶、RL 泛化（SFT Memorizes, RL Generalizes）

後訓練社群一直面臨一個核心問題：在單一任務上訓練時，模型學到的是可以遷移到未見變體的可泛化規則，還是記住了訓練分布的表面模式？Chu et al. 2025 [9] 以一項受控實證研究回答了這個問題，直接分離出後訓練方法——SFT 對上 RL——對分布外（out-of-distribution, OOD）泛化的影響。答案十分明確：RL 學到可遷移的規則，而 SFT 記憶訓練資料，並在分布偏移下崩潰。

該研究使用兩個內建規則變化的環境來理解其中的權衡：

- **GeneralPoints** 是一個算術紙牌遊戲：模型收到四張撲克牌，必須以運算子（+、-、*、/）組合牌面數值，以達到目標數字（預設為 24）。OOD 測試改變的是花牌的計分方式：訓練時使用一種規則（J、Q、K 都算 10），評估時使用另一種（J = 11、Q = 12、K = 13）。
- **V-IRL** 是一個真實世界的視覺導航任務：模型依循語言指令穿越城市街道路線，並沿途辨識地標。OOD 偏移是將動作空間從絕對方向（北、東）改為相對方向（左、右）。

在所有任務變體中，隨著訓練計算量擴大，RL 持續改善 OOD 表現，而 SFT 儘管改善了分布內（in-distribution）表現，卻持續*劣化* OOD 表現。差異幅度十分驚人：在僅有語言輸入的 V-IRL 上，OOD 偏移是從絕對方向座標改為相對方向座標，RL 將 OOD 逐步準確率從 80.8% 提升到 91.8%，而 SFT 卻使其從 80.8% 崩潰到 1.3%。SFT 模型不只是未能泛化：它摧毀了基礎模型原本就具備的空間推理能力，退化成一張從指令片語對應到絕對方向的查找表。

### 15.2.2 以做促記：On-Policy 資料減緩遺忘（Retaining by Doing: On-Policy Data Mitigates Forgetting）

上一節顯示，在單一任務上 RL 能泛化、而 SFT 會記憶。Chen et al. 2025 [356] 則提出互補的問題：當*依序*（sequentially）在多個任務上訓練時，模型能否保留它原本已經知道的東西？他們發現，RL 在目標任務上取得與 SFT 相當或更高的增益，同時遺忘的程度遠低於 SFT，並將這項優勢追溯至兩個目標函數在最佳化內容上的根本差異。

要理解這兩種方法的行為為何如此不同，我們可以透過 KL 散度的視角來檢視它們的目標。在本節中，我們首先說明兩種常見的後訓練方法可以對應到 KL 散度的兩個方向，然後解釋將它們作為損失函數使用時的數值行為，如何轉化為不同的模型行為。

KL 散度定義為兩個分布之間對數比值的期望，$\mathbb{E}_{x\sim P}\left[\log \frac{P(x)}{Q(x)}\right]$，可以寫成對數差的形式，且有兩個方向：

- **前向 KL（Forward KL）**：$\text{KL}(P\|Q) = \mathbb{E}_{x\sim P}[\log P(x) - \log Q(x)]$
- **反向 KL（Reverse KL）**：$\text{KL}(Q\|P) = \mathbb{E}_{x\sim Q}[\log Q(x) - \log P(x)]$

其中 $P$ 是目標分布，$Q$ 是我們以參數 $\theta$ 建模的分布。關鍵差異在於我們從哪個分布取樣：前向 KL 從目標（或最佳）分布 $P$ 取樣，而反向 KL 從我們的策略 $Q$ 取樣。在下面的推導中，$P$ 對應到目標 $\pi_\star$（分析 SFT 時是訓練資料分布，分析 RL 時是獎勵最佳策略（reward-optimal policy）），$Q$ 則對應到所學的策略 $\pi_\theta$（我們正在訓練的對象）。SFT 把目標放在前面——$\text{KL}(\pi_\star\|\pi_\theta)$——而 RL 顛倒了順序——$\text{KL}(\pi_\theta\|\pi_\star)$——改變了我們取樣的分布。樣本提供了學習所需的資料，而目標函數（SFT 或 RL）則依據這些資料形塑模型。

#### 15.2.2.1 SFT 前向 KL（SFT Forward KL）

從前向 KL 的定義開始：

$$\text{KL}(\pi_\star \| \pi_\theta) = \mathbb{E}_{(x,y)\sim\mathcal{D}} \left[ \log \pi_\star(y \mid x) - \log \pi_\theta(y \mid x) \right]$$

將對數差上的期望拆成兩項，得到：

$$= \mathbb{E}_{(x,y)\sim\mathcal{D}} \left[ \log \pi_\star(y \mid x) \right] - \mathbb{E}_{(x,y)\sim\mathcal{D}} \left[ \log \pi_\theta(y \mid x) \right]$$

第一項 $\mathbb{E}[\log \pi_\star(y \mid x)]$ 只依賴於資料分布，等於負熵 $-H(\pi_\star)$——一個不隨 $\theta$ 改變的常數。第二項 $-\mathbb{E}[\log \pi_\theta(y \mid x)]$ 是資料集上的負對數概度（negative log-likelihood），也就是標準的 SFT 交叉熵損失 $\mathcal{L}_{\text{SFT}}(\theta)$。代入後得到：

$$= \underbrace{-H(\pi_\star)}_{\text{const}} + \mathcal{L}_{\text{SFT}}(\theta) \propto \mathcal{L}_{\text{SFT}}(\theta) \tag{142}$$

由於熵項相對於 $\theta$ 是常數，這兩個損失具有相同的梯度與相同的最小值——最小化 SFT 損失等價於最小化**前向 KL** 散度 $\text{KL}(\pi_\star\|\pi_\theta)$。

#### 15.2.2.2 RL 反向 KL（RL Reverse KL）

讓我們從標準的 KL 正則化 RL 目標開始：

$$\max_\pi \; \mathcal{J}_{\text{RL}}(\theta) = \mathbb{E}_{x\sim\mathcal{D},\, y\sim\pi(\cdot \mid x)} \left[ r(x,y) \right] - \beta \cdot \text{KL}(\pi(\cdot \mid x) \| \pi_{\text{ref}}(\cdot \mid x)) \tag{143}$$

提出 $-\beta$ 可將最大化轉為最小化：

$$= \min_\pi \; \mathbb{E}_{x\sim\mathcal{D},\, y\sim\pi(\cdot \mid x)} \left[ \log \frac{\pi(y \mid x)}{\pi_{\text{ref}}(y \mid x)} - \frac{1}{\beta} r(x,y) \right] \tag{144}$$

引入配分函數（partition function）$Z(x) = \sum_y \pi_{\text{ref}}(y \mid x)\exp\left(\frac{1}{\beta}r(x,y)\right)$，將經獎勵傾斜（reward-tilted）的參考分布正規化為有效的機率分布，並加減 $\log Z(x)$ 之後，內層期望便成為一個 KL 散度：

$$= \min_\pi \; \mathbb{E}_{x\sim\mathcal{D}} \left[ \text{KL}\left( \pi(\cdot \mid x) \,\Big\|\, \frac{1}{Z(x)}\pi_{\text{ref}}(\cdot \mid x)\exp\left(\frac{1}{\beta}r(x,y)\right) \right) - \log Z(x) \right] \tag{145}$$

由於 $\log Z(x)$ 不依賴於 $\pi$，而 KL 散度非負、且唯有兩個分布完全相同時才等於零，因此當 $\pi$ 等於這個獎勵傾斜分布時，KL 便在零處取得最小值。於是，在獎勵 $r(x,y)$ 之下的最佳策略為：

$$\pi_\star(y \mid x) = \frac{1}{Z(x)} \pi_{\text{ref}}(y \mid x) \exp\left(\frac{1}{\beta} r(x,y)\right) \tag{146}$$

現在我們可以直接展示它與反向 KL 的關聯。展開 $\text{KL}(\pi_\theta\|\pi_\star)$，並代入 $\log \pi_\star(y \mid x) = \log \pi_{\text{ref}}(y \mid x) - \log Z(x) + \frac{1}{\beta}r(x,y)$：

$$
\begin{aligned}
\text{KL}(\pi_\theta \| \pi_\star) &= \mathbb{E}_{x\sim\mathcal{D},\, y\sim\pi_\theta(\cdot\mid x)} \left[ \log \pi_\theta(y \mid x) - \log \pi_\star(y \mid x) \right] \\
&= \mathbb{E}_{x\sim\mathcal{D},\, y\sim\pi_\theta(\cdot\mid x)} \left[ \log \pi_\theta(y \mid x) - \log \pi_{\text{ref}}(y \mid x) + \log Z(x) - \frac{1}{\beta} r(x,y) \right] \\
&= -\frac{1}{\beta}\mathbb{E}_{x,y}[r(x,y)] + \text{KL}(\pi_\theta(\cdot \mid x) \,\|\, \pi_{\text{ref}}(\cdot \mid x)) + \underbrace{\log Z(x)}_{\text{const}} \\
&\propto -\frac{1}{\beta}\mathbb{E}_{x,y}[r(x,y)] + \text{KL}(\pi_\theta(\cdot \mid x) \,\|\, \pi_{\text{ref}}(\cdot \mid x)) \\
&= -\frac{1}{\beta}\mathcal{J}_{\text{RL}}(\theta)
\end{aligned}
$$

等價地，最大化 RL 目標 $\mathcal{J}_{\text{RL}}(\theta)$ 就等同於最小化**反向 KL** 散度 $\text{KL}(\pi_\theta\|\pi_\star)$。

這個推導顯示，SFT 與 RL 最佳化的是根本不同的目標：SFT 最小化前向 KL，RL 最小化反向 KL。

KL 散度的兩個方向會引發不同的最佳化壓力。

前向 KL 會在目標分布有質量而模型沒有的地方懲罰模型，因此傾向鼓勵**模式涵蓋**（mode covering）——模型將機率廣泛分散，以涵蓋目標的所有主要模式。原因在於：前向 KL 的期望是在 $\pi_\star$ 之下取的，所以模型若未能對目標具有質量的區域指派機率，就會受到重罰。

反向 KL 只會在模型實際放置質量的區域懲罰模型，因此傾向鼓勵**模式尋求**（mode seeking）：模型可以集中在單一高機率模式上而忽略其他模式。這裡的期望是在 $\pi_\theta$——模型自身的分布——之下取的，因此 $\pi_\theta(y \mid x) \approx 0$ 的區域對損失的貢獻微乎其微，即使 $\pi_\star$ 在那裡指派了可觀的質量。同時，它也會懲罰模型把質量放在目標沒有質量的地方。

基於這個區別，我們可能會天真地預期 SFT 遺忘得比 RL *少*：模式涵蓋的前向 KL 應該會在目標的所有模式上維持質量、保留舊知識，而模式尋求的反向 KL 則可能塌縮到單一高獎勵模式並拋棄其他模式。然而，事實正好相反。這種直覺假設的是單峰（unimodal）策略，但預訓練的大型語言模型包含多個模式——對於多峰（multimodal）分布，這個動態會翻轉。

考慮一個具有兩個模式的策略：一個代表先驗知識的「舊」模式，以及一個對應目標任務的「新」模式（圖 43）。前向 KL（SFT）試圖涵蓋目標分布的兩個模式，這迫使策略拉伸，並*從*舊模式重新分配機率質量，破壞其形狀並造成遺忘。相較之下，反向 KL（RL）只需要在某個高獎勵區域放置質量，因此它可以將自己取樣到的新模式朝目標移動，完全不觸碰舊模式，讓先驗知識保持完好。

RL 的模式尋求行為——反向 KL 的一種結構性性質——保留了模型先驗知識的廣度，並帶來更好的泛化。

總結如下：

- **SFT（前向 KL）**：$\text{KL}(\pi_\star\|\pi_\theta)$——樣本來自目標 $\pi_\star$，一個由人類撰寫的補全所構成的固定資料集。對每個範例，我們問：我們的模型 $\pi_\theta$ 對它指派了多少機率？模型從不生成任何東西；它學習模仿。這種模式涵蓋的壓力迫使策略廣泛地重新分配機率質量，可能因此破壞先驗知識。
- **RL（反向 KL）**：$\text{KL}(\pi_\theta\|\pi_\star)$——樣本來自我們自己的策略 $\pi_\theta$。對模型生成的每個補全，我們問：它與獎勵最佳策略 $\pi_\star$ 有多接近？由於模型只在自己的生成內容上訓練，更新會停留在它原本就放置機率質量的局部區域——獎勵訊號告訴它應該強化其中哪些生成內容，將機率朝 $\pi_\star$ 移動，而不干擾分布的其餘部分。

### 15.2.3 RL 的剃刀：為何線上 RL 遺忘得更少（RL's Razor: Why Online RL Forgets Less）

上一節顯示，on-policy 取樣驅動了 RL 對遺忘的抵抗力，並將其機制追溯到前向對反向 KL 的動態。對任何給定的任務而言，存在許多能達成高表現的不同策略。Shenfeld et al. 2026 [357] 對 RL 的泛化提出了互補的觀點，提出 **RL 的剃刀**（RL's Razor）論題，其主張如下：

> 在新任務的眾多高獎勵解之中，RL 等 on-policy 方法天生偏向那些在 KL 散度上與原始策略保持較近的解。

作者發現，對過去任務的遺忘程度，與微調後策略偏離初始模型的距離（以 KL 散度衡量）成正比：

$$\text{Forgetting} \approx f\left( \mathbb{E}_{x\sim\tau} \left[ \text{KL}(\pi_0(\cdot \mid x) \| \pi(\cdot \mid x)) \right] \right) \tag{147}$$

在多種 RL 與 SFT 的訓練變體中，作者以實證方式證明，遺忘與訓練後策略和初始策略之間的 KL 散度高度相關（$R^2 = 0.96$），**而且是以新任務資料衡量的**。這一點令人驚訝，因為 KL 是在*新任務的*輸入分布上衡量的，而不是在先前任務的保留資料上，但它仍然能夠預測過去任務的表現下降。在實務上，這為我們提供了一個強大的工具，可以直接從基礎策略與訓練後策略之間的漂移來估計遺忘——在我們新的專門資料上衡量 KL 距離。

為了釐清是什麼驅動了 RL 策略較小的 KL 偏移，作者沿著兩個軸分解 RL 與 SFT 的差異——on-policy 對上離線（offline）資料，以及目標函數是否包含負梯度（negative gradients）（RL 中存在：當樣本得分低於獎勵基線時；SFT 中則不存在：它只強化正確的示範），負梯度會將機率從錯誤的輸出推開。值得注意的是，他們發現 on-policy 對上離線資料完全解釋了泛化表現的差異，而負梯度沒有可辨別的影響。

*圖 44：偏向 KL 最小解可減少遺忘。（左）在能解決新任務的策略之中，RL 收斂到 KL 上最接近基礎模型的那些策略。（右）在相同的新任務表現之下，這種 KL 偏向相較於 SFT 帶來更高的先前任務保留率。取自 Shenfeld、Pari 與 Agrawal 2026。授權 CC-BY。*

直觀而言，on-policy 方法取樣的是模型原本就指派了不可忽略機率的輸出，因此每次更新都被約束在接近目前分布的範圍內。另一方面，SFT 是在一個固定的外部分布上訓練，該分布可能與模型目前產出的內容相距任意遠，而每一步梯度都會將模型拉向那個遙遠的目標，無視模型自身的信念。

## 15.3 其他類型的正則化（Other Types of Regularization）

在後訓練文獻中，許多知名模型納入了其他的正則化方法，協助它們在各自的設定中達到領先的表現。這裡收錄以下兩個例子，是為了描繪一些領先模型如何操縱後訓練設定以獲得穩定的最佳化，而不是把它們當作在每種設定中都必然有效的工具。無數更有創意的解法可以奏效，也將會被發現！

### 15.3.1 預訓練梯度（Pretraining Gradients）

看待正則化的另一種方式是：你可能有一個希望模型保持接近的*資料集*，如同 InstructGPT [3] 所做的那樣，「為了修復在公開 NLP 資料集上的效能退化」。為了實作這一點，他們修改了 RLHF 的訓練目標。以公式 138 為出發點，我們可以將其轉換為一個透過從 RL 策略模型取樣來最佳化的目標函數——補全 $y$ 來自 RLHF 所用之 RL 資料集中的提示 $x$——得到：

$$J(\theta) = \mathbb{E}_{(x,y)\sim\mathcal{D}_{\pi_{\text{RL},\theta}}} \left[ r_\theta(y \mid x) - \lambda r_{\text{reg.}} \right] \tag{148}$$

接著，我們可以在預訓練期間使用的標準自迴歸下一詞元預測損失（next-token prediction loss）之上，針對從預訓練語料庫（或其他資料集）取樣的一組文件，加入一個鼓勵較高機率的額外獎勵，以維持文字的連貫性：

$$J(\theta) = \mathbb{E}_{(x,y)\sim\mathcal{D}_{\pi_{\text{RL},\theta}}} \left[ r_\theta(y \mid x) - \lambda r_{\text{reg.}} \right] + \gamma \mathbb{E}_{x\sim\mathcal{D}_{\text{pretrain}}} \left[ \log(\pi_{\text{RL},\theta}(x)) \right] \tag{149}$$

近期研究提出使用負對數概度項來平衡直接偏好最佳化（Direct Preference Optimization, DPO）的最佳化 [358]。鑑於 DPO 損失的成對（pairwise）性質，同樣的損失修改也可以套用在獎勵模型訓練上，約束模型去預測準確的文字。

該最佳化是對 DPO 的一項修改。

$$\mathcal{L}_{\text{DPO+NLL}} = \mathcal{L}_{\text{DPO}}(c_i^w, y_i^w, c_i^l, y_i^l \mid x_i) + \alpha \mathcal{L}_{\text{NLL}}(c_i^w, y_i^w \mid x_i) \tag{150}$$

$$= -\log \sigma \left( \beta \log \frac{P_\theta(c_i^w, y_i^w \mid x_i)}{P_{\text{ref.}}(c_i^w, y_i^w \mid x_i)} - \beta \log \frac{P_\theta(c_i^l, y_i^l \mid x_i)}{P_{\text{ref.}}(c_i^l, y_i^l \mid x_i)} \right) - \alpha \frac{\log P_\theta(c_i^w, y_i^w \mid x_i)}{|c_i^w| + |y_i^w|}, \tag{151}$$

其中 $P_\theta$ 是可訓練的策略模型，$P_{\text{ref.}}$ 是固定的參考模型（通常是 SFT 檢查點），而 $(c_i^w, y_i^w)$ 與 $(c_i^l, y_i^l)$ 分別表示提示 $x_i$ 所對應的獲勝與落敗補全。第一項是標準的 DPO 邏輯斯損失（logistic loss）：它利用對數概度比之差 $\log \frac{P_\theta}{P_{\text{ref.}}}$ 來擴大勝、負之間的間距（margin），而 $\beta$ 控制這個偏好訊號將模型拉離參考模型的強度。第二項是對獲勝補全施加的長度正規化（length-normalized）負對數概度懲罰，以 $\alpha$ 加權，有助於讓偏好文字在絕對的語言建模意義上維持高概度，而不僅僅是相對於被拒絕的樣本更好而已。

### 15.3.2 基於間距的正則化（Margin-Based Regularization）

在 RLHF 技術堆疊的其他部分，對最佳化的控制較不明確。大多數獎勵模型除了標準的對比損失函數（contrastive loss function）之外，沒有任何正則化。直接對齊演算法（Direct Alignment Algorithms）則以不同的方式處理對 KL 散度的正則化——透過 $\beta$ 參數（見直接對齊一章）。

Llama 2 為獎勵模型訓練提出了一種間距損失（margin loss）[49]：

$$\mathcal{L}(\theta) = -\log\left( \sigma\left( r_\theta(y_c \mid x) - r_\theta(y_r \mid x) - m(y_c, y_r) \right) \right) \tag{152}$$

其中 $m(y_c, y_r)$ 是兩個資料點 $y_c$ 與 $y_r$ 之間的間距，代表兩位標註者評分之差的數值大小。這可以透過讓標註者以數值量表對輸出評分，或使用量化的排序方法（例如李克特量表（Likert scales））來達成。

獎勵間距在直接對齊文獻中被大量使用，例如獎勵加權 DPO（Reward-weighted DPO）；獎勵感知偏好最佳化（Reward-aware Preference Optimization, RPO），它遵循 DPO 損失的形式，將獎勵模型分數整合進更新規則 [30]；以及 REBEL [190]，它在迴歸損失（regression-loss）的形式中帶有獎勵差值加權。
