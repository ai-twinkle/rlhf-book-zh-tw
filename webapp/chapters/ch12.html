# 第 12 章　合成資料與蒸餾（Synthetic Data & Distillation）

> 譯自 Nathan Lambert, *Reinforcement Learning from Human Feedback*（rlhfbook.com），2026-07-01 版，原文第 143–158 頁。

來自*人類回饋*的強化學習，深植於一個理念：讓人類的影響力持續存在於我們所打造的模型之中。當第一批模型成功以 RLHF 訓練完成時，人類資料是以這種方式改進模型的*唯一*可行途徑。

當時，只有人類能為訓練撰寫出品質夠高的問題回覆；也只有人類能蒐集可靠且具體的回饋資料來訓練獎勵模型。

隨著 AI 模型愈來愈強，這個假設迅速瓦解。合成資料遠比人類資料便宜、也更容易迭代，它的出現降低了實驗與研究的成本，促成了 RLHF 的普及。這也使得 RLHF 成為更廣義的「後訓練」（post-training）模型塑造方法中，最早受到關注的核心。本章將概略介紹合成資料如何、以及為何正在取代或擴充 RLHF 流程中的許多環節。

## 12.1 合成資料的角色（The Roles of Synthetic Data）

對合成資料常見的批評之一是**模型崩潰**（model collapse）——指反覆在模型自身的生成內容上訓練，會逐漸窄化有效的訓練分布 [270]。隨著多樣性下降，罕見的事實與風格會被低估，小錯誤也可能在多次迭代中被放大，導致泛化能力變差。實務上，這些失敗大多與「在未經過濾、重複、單一模型的輸出上自我訓練」有關；混入真實／人類資料、使用多樣的教師模型、去重複，以及嚴格的品質過濾，大致就能避開崩潰的情境。就今日前沿實驗室的訓練流程而言，證據顯示合成資料可以、也應該被大規模使用，而不會出現崩潰論最強版本所暗示的災難性退化 [271] [272]。

領先的模型**需要合成資料**才能達到最佳效能。現代後訓練中的合成資料涵蓋訓練的許多環節——語言模型被用來從種子範例生成新的訓練提示 [273]、修改既有提示、為提示生成完成（completion）[274]、提供 AI 回饋以建立偏好資料 [28]、過濾完成 [275]，以及更多其他用途。合成資料是後訓練的關鍵。

合成資料能發揮到這種程度的影響力，是從 GPT-4 等級的模型才開始的。在早期語言模型（如 Llama 2 與 GPT-3.5-Turbo）的時代，模型在生成或監督資料流程方面還不夠可靠。在一到兩年之內，語言模型生成答案的能力就遠遠超越了人類。在從 GPT-3.5 過渡到 GPT-4 等級模型的過程中，模型執行 LLM 評審（LLM-as-a-judge）任務的能力也隨之浮現。GPT-4 或更好的模型在對一段內容生成回饋或評分時，穩健性與一致性都高出許多。

自 2022 年底 ChatGPT 問世以來的這些年間，我們見到許多具有影響力的合成資料集。其中包括：UltraFeedback [28]，第一個著名的合成偏好資料集，開啟了 DPO 革命；Stanford Alpaca，2023 年最早的聊天式微調資料集之一；Tülu 3 [6] 中聚焦特定技能（例如數學、程式、指令遵循）的合成資料集；以及 OpenThoughts 3 和 2025 年許多其他用於訓練思考模型的合成推理資料集 [173]。今日要入門業界等級後訓練的多數經典參考資料，都涉及上述的 Tülu 3 或 OpenThoughts 3 之類的資料集，而快速入門指南往往從較小、較簡單的資料集（如 Alpaca）著手，因為訓練速度快得多。

另一項重大變化與資料集規模有關：微調資料集的提示數量不斷成長——Alpaca 是 5.2 萬筆，OpenThoughts 與 Tülu 3 則是百萬筆以上——回覆的長度也在增加。更長的回覆與更多的提示，使得 Alpaca 資料集約在 1,000 萬訓練 token 之譜，Tülu 大約大 50 倍、約 5 億 token，OpenThoughts 3 更大，約在 100 億 token 之譜。

在這段轉變過程中，合成資料並非在整條流程中均勻地取代人類資料。就**指令資料（SFT）**而言，合成生成已大致勝出——如今從更強模型蒸餾而得的完成，品質高於大多數人類寫作者在規模化情境下所能提供的（在最困難的前沿推理問題上有些例外）。就 **RLHF 的偏好資料**而言，情況比較分歧：學術研究顯示合成偏好資料表現相當，但前沿實驗室仍將人類偏好資料視為競爭護城河。就**評測**而言，分工又是另一種樣貌：LLM 評審讓模型輸出的*評分*得以低成本規模化，但底層的基準測試與標準答案標籤仍需由人類建立。整體模式是：在模型可靠度超越人類之處，合成資料佔據主導；而在能力前沿、建立標準答案，以及引導訓練方面，人類仍不可或缺。

## 12.2 以合成資料進行蒸餾（Distillation with Synthetic Data）

在關於合成資料在語言模型中角色的討論裡，「蒸餾」（distillation）一直是最有力的說法。蒸餾一詞源自深度學習文獻中師生知識蒸餾（teacher-student Knowledge Distillation, KD）的技術定義 [276]。

![圖](../webapp/assets/figures/fig-p144-1.png)
*圖 36：傳統知識蒸餾以 KL 散度損失訓練較小的學生模型，去匹配較大教師模型的軟機率分布。兩個模型同時處理相同的輸入，而溫度縮放（$\tau > 1$）會使分布變得平滑，以揭露更多類別之間關係的資訊。*

蒸餾在口語上則泛指使用較強模型的輸出來訓練較小的模型。

![圖](../webapp/assets/figures/fig-p145-1.png)
*（示意圖：提示 $\{x_i\}$ 輸入強模型（例如 GPT-4）產生完成 $\{y_i\}$，兩者構成用於訓練較小模型的合成資料集 $\{(x_i, y_i)\}$。）*

在後訓練中，這種廣義的蒸餾概念通常有兩種形式：

1. 作為橫跨後訓練流程各環節的資料引擎：為指令生成完成、偏好資料（或憲法式 AI（Constitutional AI）），或 RL 的驗證。
2. 將特定技能從較強模型轉移到較弱模型，這通常用於數學推理或程式撰寫等特定技能。

第一種策略隨著語言模型的演進而日益流行，因為在各式任務上，模型撰寫答案已比人類更可靠。GPT-4 等級的模型將其範疇擴大到：針對數學與程式等複雜任務蒸餾更強的模型（如前所述）。在這裡，蒸餾促成了一種模型套件（model suite）的作法：實驗室往往會訓練一個大型的內部模型，例如 Claude Opus 或 Gemini Ultra，不對外釋出，只在內部用來讓較強的模型變得更好。在開放模型的世界，常見作法是將封閉 API 模型的訓練資料蒸餾到較小、公開釋出權重的模型中 [26]。在此之中，策劃高品質的提示並過濾教師模型的回覆，是效能最大化的關鍵。

將特定技能轉移到較小的語言模型，使用的是同樣的蒸餾原理——取得可用於訓練的最佳資料。這方面已有許多論文研究如何使用來自較強模型的有限資料集，來改進對齊 [14]、數學推理 [277] [278]，以及測試時擴展（test-time scaling）[158]。

本章其餘部分的合成資料方法，都是把語言模型輸出直接用於訓練流程之中的各種資料配方。

## 12.3 邁向 on-policy 師生蒸餾（The Path to On-Policy, Teacher-Student Distillation）

雖然廣義的蒸餾已成為語言模型後訓練的標準作法，但隨著後訓練配方轉向推理與代理式（agentic）模型，「師生知識蒸餾」這個特定子領域重新受到關注。以新形式知識蒸餾訓練的領先模型包括阿里巴巴的 Qwen3 [60]、小米的 MiMo-V2-Flash [184]、智譜 AI 的 GLM-5 [279]，以及 DeepSeek-V4-Pro [280]。

蒸餾之所以放在本章，是因為現代後訓練中許多合成資料的用法，實務上就是受蒸餾啟發的流程：由較強的模型產生標籤、完成、logits、評語或其他監督訊號，再以這些訊號訓練學生模型。與此同時，蒸餾的技術文獻正逐漸發展為自成一格的後訓練方法，特別是隨著 on-policy 與自我蒸餾（self-distillation）配方日益普及。目前我們把它視為合成資料工具箱的一部分來介紹，但本書未來的版本或許值得為蒸餾另闢專章，作為與指令微調、強化學習等並列的訓練工具。

### 12.3.1 將知識蒸餾調整至語言模型（Adapting Knowledge-Distillation for LMs）

最初的文獻引入知識蒸餾，是特別作為一種從已訓練完成、更強及／或更大的*教師*網路訓練*學生*模型的方法 [276]。KD 的特點是使用*軟*訓練標籤，而非標準目標函數（例如以交叉熵損失做下一個 token 預測）所用的 one-hot 標籤。基於軟標籤的目標函數關注所有可能的下一個 token 或預測的完整分布，而不只是單一預測 token 是否正確，並訓練學生分布去匹配教師分布。

KD 原則上可以套用於任何深度學習問題，例如對輸入預測單一類別。若要將它特別套用到自迴歸式的語言模型，可以把損失分解成逐 token 的分布匹配損失。2016 年，Kim 與 Rush 將 KD 應用於讓學生模型從教師模型生成的*序列*中學習 [281]。

令 $s$ 為來源句子或提示，$u = (u_1, \ldots, u_J)$ 為來自教師模型的完整輸出序列，$\mathcal{V}$ 為輸出詞彙表（分詞器中所有可能的 token），$q$ 為教師模型在下一個 token 上的分布，$p$ 為學生分布。這裡我們用 $u$ 作為完整教師輸出序列的中性符號，把 $a$ 保留給下文 on-policy／RL 記號中由學生取樣的完成／動作序列。請注意，原論文稱此為詞層級（word-level）蒸餾，但對現代語言模型而言，最好把它理解為在分詞器詞彙表上的逐 token 分布匹配，因為該論文早於現代的子詞（sub-word）分詞器：

$$\mathcal{L}_{\text{WORD-KD}} = -\sum_{j=1}^{J}\sum_{k=1}^{|\mathcal{V}|} q(u_j = k \mid s, u_{<j}) \log p(u_j = k \mid s, u_{<j}). \tag{127}$$

WORD-KD 是將經典的、受 Hinton 啟發的師生知識蒸餾應用於語言模型。這通常會在訓練語料中既有的一段靜態文本上進行。

它具有一般的交叉熵形式 $-\sum_z q(z)\log p(z)$。在每個位置 $j$，教師分布 $q$ 對每個可能的下一個 token $k \in \mathcal{V}$ 都指派機率，而當學生分布 $p$ 對教師認為可能性高的 token 給出低機率時，就會受到懲罰。

序列層級蒸餾則把 $\mathcal{U}$ 視為所有可能輸出序列的空間，讓學生匹配教師在完整序列上的分布。由於對所有完整序列 $u \in \mathcal{U}$ 求和是不可行的——這需要對指數多的潛在序列求和——Kim 與 Rush 以單一高機率教師輸出 $\hat{u}$ 上的點質量（point mass）來近似教師的序列分布。這裡 $\hat{u}$ 是以教師模型透過束搜尋（beam search）產生的序列，因此 $\hat{u} = \text{BeamSearch}_q(s) \approx \arg\max_{u\in\mathcal{U}} q(u \mid s)$：

$$\begin{aligned}
\mathcal{L}_{\text{SEQ-KD}}(s) &= -\sum_{u \in \mathcal{U}} q(u \mid s)\log p(u \mid s) \approx -\log p(\hat{u} \mid s) \\
&= -\sum_{j=1}^{|\hat{u}|} \log p(\hat{u}_j \mid s, \hat{u}_{<j}).
\end{aligned} \tag{128}$$

SEQ-KD 朝現代方法邁進了一步：由教師模型生成 token 作為學生的訊號。這是解鎖我們稍後將看到的各種 on-policy 蒸餾風格的核心步驟，也是讓「對所有可能序列的計算」變得可行的必要條件。在過渡到現代模型常用的 KD 變體時，我們會把這種風格的訓練稱為*離線*（offline）KD——意即用於訓練學生模型的生成內容是事先（a priori）產生的。

在繼續之前，有兩個關聯值得一提。

第一，過去有一系列以離線 KD 訓練的知名模型，例如分類器 DistilBERT [282] 與 TinyBERT [283]，它們把語言模型的其他改進與離線蒸餾結合（值得注意的是，並非*序列*蒸餾，因為這些編碼器模型並不是為多 token 自迴歸預測而蒸餾的）。

第二，我們可以把它連結到第 15 章對 Kullback-Leibler（KL）散度的完整討論，因為上面使用的交叉熵目標與 KL 散度密切相關。對教師分布 $q$ 與學生分布 $p$，交叉熵定義為

$$H(q,p) = -\sum_z q(z)\log p(z). \tag{129}$$

這與式 (127) 及式 (128) 的第一項具有相同形式。交叉熵也可以分解為教師分布的熵加上一個 KL 散度：

$$\begin{aligned}
H(q,p) &= H(q) + D_{\text{KL}}(q \,\|\, p) \\
&= -\sum_z q(z)\log q(z) + \sum_z q(z)\log\frac{q(z)}{p(z)}.
\end{aligned} \tag{130}$$

第一項 $H(q)$ 只取決於教師。因此，當教師是固定的、且是訓練資料的來源時，最小化交叉熵等價於最小化從教師到學生的前向 KL（forward KL），$D_{\text{KL}}(q\|p)$。這正是離線 KD 與 SFT 式訓練所使用的 KL 方向。

### 12.3.2 從離線到 on-policy 蒸餾（From Offline to On-Policy Distillation）

這些*離線* KD 演算法有一些侷限，促成了 on-policy 變體的出現。學習的離線本質意味著：學生模型在推論時自行生成的序列，與教師模型之間可能存在分布不匹配。例如，前向 KL 目標可能促使學生模型高估教師分布中的低機率區域。這些問題合起來，為 *on-policy* 蒸餾（on-policy distillation, OPD）開啟了空間。

這種訓練—測試落差稱為**曝露偏差**（exposure bias）[284] [285]。離線 KD 取樣教師軌跡 $u \sim \pi_T(\cdot \mid s)$，並在所得的前綴上最小化逐 token 的 KL：

$$\mathcal{L}_{\text{KD}}(\theta) = \mathbb{E}_{s\sim\mathcal{D},\, u\sim\pi_T(\cdot\mid s)} \sum_t D_{\text{KL}}\big(\pi_T(\cdot \mid s, u_{<t}) \,\|\, \pi_\theta(\cdot \mid s, u_{<t})\big). \tag{131}$$

但在推論時，學生是依照自己的策略進行 rollout，因此真正重要的量是沿著*它自己的*軌跡的期望任務損失：

$$\mathcal{L}_{\text{eval}}(\theta) = \mathbb{E}_{s\sim\mathcal{D}_{\text{test}},\, a\sim\pi_\theta(\cdot\mid s)}\, \ell_{\text{task}}(s, a) \tag{132}$$

這裡 $\ell_{\text{task}}(s,a)$ 表示對完成後的學生回覆所計算的任何下游任務損失，例如答案錯誤、測試案例未通過，或評審／評分準則損失。曝露偏差是不等式 $\pi_T(\cdot \mid s) \neq \pi_\theta(\cdot \mid s)$ 的直接後果：訓練期間造訪的前綴 $(s, u_{<t})$ 與測試時造訪的前綴 $(s, a_{<t})$ 來自不同的狀態造訪分布，因此學生被監督的狀態集合，與它實際行動所處的狀態集合並不相同。

轉向 on-policy 蒸餾的核心變化在於：我們可以調整最佳化方式，改為從學生模型取樣、並衡量其與教師分布的距離，而不是從教師模型取樣。MiniLLM 指出需要轉向反向 KL（reverse KL）最佳化（我們在第 15 章會直觀地解釋為什麼這個目標可能更好），並提出在線上策略梯度 RL 框架內使用 KD 損失函數 [286]。其他同期工作 [287] 展示了 on-policy KD 的潛力，並把「由學生生成、由教師評分」的迭代過程連結到 RL 文獻中的模仿學習（imitation learning）。要建立這個連結，可以看一種模仿學習演算法 DAgger：它迭代地訓練一個代理人，讓它以學到的策略在環境中行動，並由一個 oracle 策略給出「它當時應該採取什麼動作」的回饋，這些回饋隨後可用來更新其策略 [288]。

這種落差的代價，可以透過啟發 DAgger 的監督式模仿學習界（bound）來量化。在原始的離散動作設定中，假設學到的策略在教師誘導的訓練分布上，以期望每步動作誤差 $\epsilon$ 匹配教師，其中 $\mathbb{I}[\cdot]$ 是條件為真時回傳 1、否則回傳 0 的指示函數，

$$\mathbb{E}_{s_t \sim d_{\pi_T}}\big[\mathbb{I}(\pi_\theta(s_t) \neq \pi_T(s_t))\big] \leq \epsilon. \tag{133}$$

監督式模仿學習的分析 [288] 顯示，沿著從學生取樣、長度為 $L$ 的軌跡所累積的期望損失，可能隨 $L$ 呈平方級成長 [285]：

$$\mathbb{E}_{a\sim\pi_\theta(\cdot\mid s)}\left[\sum_{t=1}^{L} \ell(s, a_{<t})\right] \leq O(\epsilon L^2). \tag{134}$$

對 LLM 而言，這個離散動作的界應被視為一種類比，而非理論保證。實務上，LLM 是在長視野上預測完整的下一個 token 分布，因此式 (133) 中的 0-1 動作不一致假設並不能乾淨地套用。提示或前綴可以自然地對應到狀態、取樣到的 token 對應到動作，但 token 層級的蒸餾通常以 KL 或交叉熵等分布式損失來衡量，所以經典的 DAgger 數學並不能完全轉移。

這種 $O(\epsilon L^2)$ 的誤差累積在現代 LLM 上尤其明顯，因為它們動輒生成橫跨數千 token 的序列。單一個次佳的 token 會讓前綴稍微偏離分布，而模型從未見過這個被擾動的前綴，因此更可能再次出錯，導致文本品質劣化或出現幻覺。On-policy 蒸餾的解法是*迭代地*從當前學生模型取樣完成，並在其造訪的狀態上以教師進行監督。學生面對自己的錯誤、在它實際造訪的分布外狀態上獲得教師回饋，並學會恢復（recovery）行為。根據 DAgger 的互動式模仿學習分析，這種迭代程序可以把誤差累積從 $O(\epsilon L^2)$ 降到 $O(\epsilon L)$ [288]。對 LLM 而言，這解釋了 OPD 背後的動機：確切的界未必能乾淨地套用到每一種 token 層級的蒸餾設定，但 on-policy 方法在實務上的成功支持了這個底層直覺。

在 on-policy 蒸餾中，令 $s$ 為提示，$a = (a_1, \ldots, a_L)$ 為從當前學生策略 $\pi_\theta(\cdot \mid s)$ 取樣的完成，並令 $s_t = (s, a_{<t})$ 為第 $t$ 步的 token 層級狀態。教師策略 $\pi_T$ 是固定的，因此這個目標是在由學生誘導出的狀態上，比較學生的下一個 token 分布與教師的分布。由於期望是從 $\pi_\theta$ 取樣、且學生分布位於 $D_{\text{KL}}(\pi_\theta\|\pi_T)$ 的左側，這是一個反向 KL 目標：

$$\mathcal{L}_{\text{OPD}}(\theta) = \mathbb{E}_{s,\, a\sim\pi_\theta(\cdot\mid s)} \sum_t D_{\text{KL}}\big(\pi_\theta(\cdot\mid s_t)\,\|\,\pi_T(\cdot\mid s_t)\big). \tag{135}$$

這裡我們已改用期望記號，如第 6 章所大量使用的——該章涵蓋基礎的 RL 策略梯度演算法——因為這個最佳化是透過取樣軌跡並以數值方式估計梯度來求解的。轉向這種取樣框架，自然銜接到現代以 RL 訓練 LLM 的基礎設施，其設計正是為了在「以當前受訓策略生成 token」與「執行學習更新」之間快速交替。

事實上，近期的 OPD 實作把 KD 與 RL 的這種整合又往前推了一步：直接把 KD 距離當作 RL 最佳化中的獎勵訊號。一個典型的實作是把「對反向 KL 距離的逐 token 貢獻取負值」代入 RL 演算法中的優勢（advantage）[289]。對在狀態 $s_t$ 取樣到的 token $a_t$，token 層級的對數機率差可以寫成一個類似優勢的訊號：

$$A_t^{\text{OPD}} = \log \pi_T(a_t \mid s_t) - \log \pi_\theta(a_t \mid s_t). \tag{136}$$

使用「逐 token KL 貢獻的負值」把最小化轉成了最大化訊號：教師評分高於學生的 token 得到正優勢，教師評分低於學生的 token 得到負優勢。教師的對數機率差就像稠密的 token 層級回饋，可能比稀疏的可驗證獎勵或獎勵模型輸出提供更有用的學習訊號。

### 12.3.3 現代 OPD 變體（Modern OPD Variants）

這個設定還可以進一步擴充：使用多個教師模型來教導一個最終模型，或在生成中插入額外資訊以協助模型辨識錯誤。首先，我們介紹如何把多個教師整合到單一訓練中。這些教師可以是特定的專家模型（例如針對數學或程式等領域），也可以是先前的中繼訓練檢查點。對每個教師，可以按訓練批次中的提示或任務類型選擇貢獻權重，構成多教師 on-policy 蒸餾（Multi-Teacher On-Policy Distillation, MOPD）[184]。對多個教師，令 $\pi_{T_k}$ 為第 $k$ 個教師、$w_k(s)$ 為其隨提示而變的混合權重（滿足 $\sum_k w_k(s) = 1$），置於反向 KL 損失中：

$$\mathcal{L}_{\text{MOPD}}(\theta) = \mathbb{E}_{s,\, a\sim\pi_\theta(\cdot\mid s)} \sum_t \sum_k w_k(s)\, D_{\text{KL}}\big(\pi_\theta(\cdot\mid s_t)\,\|\,\pi_{T_k}(\cdot\mid s_t)\big). \tag{137}$$

在大規模後訓練中，這能讓配方在日益成長的組織中進一步擴展。多個團隊可以各自打造高品質的專家模型，作為後續最終學生模型的教師模型，如 [280] 與 [184] 的作法。

OPD 有許多方式可以與本書探討的其他領域結合，例如把反向 KL 作為優勢，疊加在其他形式的優勢計算之上（如 GRPO 的群組層級正規化），從而實現更複雜的獎勵塑形（reward shaping）。KD 方法在後訓練方法中相當特別，因為它們通常要求學生與教師共用分詞器——監督訊號可以是來自另一個 LLM 的逐 token 回饋。

延伸的作法，例如 on-policy 自我蒸餾（On-Policy Self-Distillation, OPSD），是讓語言模型自己（或藉助外部工具）驗證一條完成，充當帶有特權資訊的教師，使模型無需一個明確更強的教師也能提升自身表現 [290]（OPSD 訓練的概覽見圖 38）。例如，Cursor 就以「對 RL 軌跡施加針對性文字回饋」形式的自我蒸餾，訓練其 Composer 2.5 程式模型 [291]，該模型由 Kimi K2.5 微調而來。以下是簡化後的直觀說明，實務上下述設定會與其他損失函數（如程式正確性）結合。在這個設定中，Cursor 讓模型以一個帶有常見錯誤清單的評判提示來審查 RL 軌跡。當發現錯誤時，評判模型會在 RL 過程中修改生成的序列——插入一個提示（hint），讓模型未來能從中學習——然後再進行蒸餾損失的計算。這形成一個迴圈：先在 RL 中以標準語言模型生成產生完成，接著執行評判模型並視情況插入 hint token，最後為新的完成生成 logprobs，用於部署知識蒸餾損失。在 token 空間中的 hint 足以幫助模型修正自己的輸出，即使是在效能的絕對前沿上持續進步（關於如何最妥善地建構與使用這些 hint，仍有許多進行中的研究，這類資訊常被稱為*特權資訊*（privileged information）[292]）。

這使得 on-policy 蒸餾成為一種核心的後訓練方法，既可用來把多種技能結合到一個通用模型中，也可用來在特定的部署場景中推進前沿。

隨附程式碼 `code/distillation/` 實作了 SDPO [293]，即圖 38 所示的 on-policy 自我蒸餾設定（與同期的 OPSD 論文 [290] 密切相關）：同一個策略既扮演「以示範為條件」的教師，也扮演「只看到問題」的學生，並以逐 token 的反向 KL 訓練。它在一個小型的字串反轉任務上執行，使整個 on-policy 蒸餾迴圈足夠便宜，可以在單一 GPU 上端到端觀察。

1. **執行 SDPO 字串反轉範例。**

   ```
   cd code/
   uv run python -m distillation.train --config distillation/configs/sdpo.yaml
   ```

   觀察 `reward`、`loss` 與 `skipped`，以及迴圈中印出的教師／學生 rollout 樣本。`skipped` 計數是「輪詢到的提示中，其取樣群組不含任何正確 rollout」的數量；隨著學生進步，被跳過的提示會愈來愈少，`reward` 也會朝 1 攀升。

2. **調整 on-policy 相關旋鈕。** 複製 `distillation/configs/sdpo.yaml`，在任務固定的前提下掃描 `num_rollouts`、`kl_top_k` 與 `prompts_per_step`。每個提示的 rollout 數越多，越容易找到一條正確的同組示範（降低 `skipped`），但每步的生成成本更高；`kl_top_k` 則在「反向 KL 匹配多少教師分布」與計算量之間取捨。

## 12.4 AI 回饋（AI Feedback）

在 RLHF 爆發式成長後不久，來自 AI 回饋的強化學習（RL from AI Feedback, RLAIF）作為一種替代方案出現：讓 AI 近似流程中的人類資料環節，加速實驗與進展。廣義而言，AI 回饋是一大類技術的統稱：使用 AI 來擴增或生成「說明某個輸入品質」的資料（這些資料可用於不同的訓練方法或評測），其起點是成對偏好（pairwise preferences）[294] [295] [296]。使用 RLAIF 完全取代或擴增人類回饋的動機有很多。在 RLHF 流程中，AI 回饋最為人所知的角色在偏好資料蒐集與相關的獎勵模型訓練階段（憲法式 AI 即是其中一種特定的實作）。在本章中，我們聚焦於一般性的 AI 回饋，以及它在 RLHF 訓練流程中的這種特定用法；本書稍後還會涵蓋更多理解或使用合成資料的方式。

隨著 AI 回饋日趨成熟，其應用已超越單純取代人類偏好標籤。促成低成本偏好資料蒐集的同一套 LLM 評審基礎設施，也促成了可規模化的評測（見第 16 章），以及更晚近的、把 RL 訓練延伸到沒有可驗證答案領域的評分準則（rubrics）式獎勵——本章稍後將探索這個前沿。

### 12.4.1 平衡 AI 與人類回饋資料（Balancing AI and Human Feedback Data）

在生成特定數量的回饋方面，AI 模型遠比人類便宜：截至 2026 年，一筆人類偏好資料的成本約在 1 美元以上（甚至每提示超過 10 美元），而使用前沿 AI 模型（如 GPT-4o）的 AI 回饋成本不到 0.01 美元。此外，人力成本大致維持不變，而領先模型在這些任務上的表現持續提升、性價比也不斷改善。這種成本差距讓過去被價格排除在外的一整個群體，得以進入 RLHF 方法的實驗市場。

除了價格之外，AI 回饋在效能上相對於人類回饋也引入了不同的*取捨*，這在更廣泛的文獻中仍在持續研究。AI 回饋更為普及的角色是在評測我們正在訓練的語言模型，因為其低廉的價格使其能用於各種大規模任務——在那些場景中，人類資料的成本（或時間延遲）並不可行。這些議題彼此深度交織——AI 回饋資料永遠不會完全取代人類資料（即便在評測上），而用於評測的 AI 回饋數量將遠超過用於訓練的數量，因為評測模型的人遠多於訓練模型的人。

AI 回饋資料究竟在哪些領域與應用（即聊天、安全、推理、數學等）優於人類資料，尚未完全確立。一些早期的 RLAIF 工作顯示 AI 回饋可以完全取代人類資料，並宣稱它是有效的替代品 [294]，特別是僅以聊天任務評測時 [28] [297]。ChatGPT 之後研究 RLHF 的早期文獻，其評測套件較為狹窄，聚焦於「作為有用助理的模型」在各種領域的「對齊」（第 17 章將進一步討論）。後續工作則呈現出更細緻的圖像：在更廣的評測集（例如包含一些推理任務）上，最佳平衡點是把一部分具挑戰性的資料點路由給人類做精確標註，而大部分資料送交 AI 回饋 [298] [299]。雖然還沒有研究聚焦於「跨更廣領域的 RLHF 中人類與 AI 回饋資料的配比」，但已有許多技術報告顯示 RLHF 整體能改善這一大套評測：有些使用 DPO，如 Ai2 的 Tülu 3 [6] 與 Olmo 3 [18]，或 Hugging Face 的 SmolLM 3 [205]；也有些使用線上 RLHF 流程，如 NVIDIA 的工作混用了來自 Scale AI 的人類偏好資料與基於 LLM 的回饋（透過 HelpSteer 系列工作 [300] [108] [109] [257]）：Nemotron Nano 3 [183]、Nemotron-Cascade [301]，以及 Llama-Nemotron 推理模型 [169]。

整體而言，儘管 AI 回饋與相關方法對這個領域顯然極為有用，但人類資料顯然尚未被這些更便宜的替代品完全取代。存在許多假說，但「人類資料是否能在真實產品情境中對模型提供更精細的控制」，或對於較新的訓練方法——如性格訓練（character training，一組讓你能精確控制模型個性的新興技術，見第 17 章）——是否更有利，都還沒有被研究。對入門者而言，AI 回饋應是首選；但對正在擴展到更大規模營運的流程來說，最終轉向納入人類回饋是可能的。

RLAIF 一詞由 Anthropic 的工作《Constitutional AI: Harmlessness from AI Feedback》[24] 引入，這在 AI 社群中一度造成對論文標題中兩種方法（憲法式 AI 與 AI 回饋）之間關係的混淆。自憲法式 AI（CAI）論文發表、RLAIF 被正式化以來，RLAIF 已成為後訓練與 RLHF 文獻中的預設方法——例子多到難以枚舉。兩者的關係應理解為：CAI 是開啟 RLAIF 這個更廣領域的起始範例。

區分人類資料與 AI 回饋資料的經驗法則如下：

1. 人類資料是高雜訊、低偏差。這意味著資料的蒐集與過濾可能比較困難，但整理妥當後能提供非常可靠的訊號。
2. 合成偏好資料是低雜訊、高偏差。這意味著 AI 回饋資料比較容易上手，但可能對模型產生棘手、非預期的二階效應，而這些效應會系統性地存在於資料之中。

本書列舉了許多學術結果，顯示在 RLHF 工作流程中可以用 AI 偏好資料替代並獲得優異的評測分數 [298]；但更廣泛的業界趨勢顯示，RLHF 的文獻與較不透明的業界最佳實務是分離的。在業界，人類資料通常被視為重要的護城河與重大的技術優勢。

### 12.4.2 打造專門用於評判的 LLM（Building Specific LLMs for Judgment）

隨著 RLAIF 方法日益普及，許多人開始思考：我們是否應該用同一批模型來生成回覆、又用它們來生成評語或評分？特別是，所使用的 LLM 評審的校準（calibration）受到質疑。多項研究顯示，LLM 是不一致的評測者 [302]，而且偏好自己的回覆勝過其他模型的回覆（稱為自我偏好偏差（self-preference bias））[207]。

由於這些偏差，許多人問：解決之道是否是專為這種標註任務訓練一個獨立的模型？已有多個以「替代前沿模型作為資料標註工具」為目標的模型釋出，例如評語模型（critic model）Shepherd [303] 與 CriticLLM [304]，或類似 Auto-J [305]、Prometheus [85]、Prometheus 2 [306]、Prometheus-Vision [307] 的回覆表現評估模型，但它們並未被廣泛採納進有文獻記載的訓練配方中。有些人發現，透過重複取樣來擴展推論 [156] [308] [309]、自我精煉（self-refinement）[310]，或錦標賽排名（tournament ranking）[311]，能對真實評判提供更好的估計，或產生更高品質的偏好對。其他校準技術則讓模型的生成與評判能力共同演化 [312]。目前普遍接受的看法是：偏差固然存在，但領先的語言模型已為這項任務接受了大量訓練——因為它既是 AI 實驗室內部運作所必需，也被客戶廣泛使用——所以一般不需要訓練自己的評審模型，除非你的任務涉及大量未公開於網際網路的私有資訊。

## 12.5 憲法式 AI（Constitutional AI）

憲法式 AI（CAI）是 Anthropic 在其 Claude 模型中使用的方法，也是最早有文獻記載、大規模將合成資料用於 RLHF 訓練的案例。憲法式 AI 以兩種方式生成合成資料：

1. 依據一組原則——例如「這個答案是否鼓勵暴力？」或「這個答案是否誠實？」——對指令微調資料進行評語（critique）。當模型生成問題的答案後，它會根據憲法中的原則清單檢查答案，逐步精煉答案。之後，模型再在這份最終資料集上微調。
2. 透過語言模型判斷「在憲法中隨機抽出的一條原則作為脈絡下，哪個完成較佳」來生成成對偏好資料（類似原則引導獎勵模型（principle-guided reward models）的研究 [313]）。之後，RLHF 照常以合成資料進行，因此得名 RLAIF。

大體而言，CAI 以上述的後半部分（偏好資料）著稱，但它為指令資料引入的方法，如今在整個後訓練中被廣泛用於一般性的資料過濾與合成資料生成方法。

CAI 可以形式化如下。

透過採用一組人類撰寫的原則——他們稱之為*憲法*（constitution）——Bai 等人（2022）使用另一個 LLM 生成用於微調的人工偏好與指令資料 [24]。憲法 $\mathcal{C}$ 是一組成文原則，指出評語階段應關注的特定面向。指令資料的策劃方式是：反覆抽樣原則 $c_i \in \mathcal{C}$，並要求模型修改其對提示 $x$ 的最新輸出 $y^i$，使之符合 $c_i$。這會從用於評語的原則 $\{c_0, c_1, \cdots, c_{n-1}\}$ 產生一系列指令變體 $\{y^0, y^1, \cdots, y^n\}$。最終的資料點是提示 $x$ 加上某個 $n$ 對應的最終完成 $y^n$。

偏好資料的建構方式類似、但更簡單：以 $\mathcal{C}$ 中的一部分原則作為回饋模型的脈絡。回饋模型收到一個提示 $x$、一組原則 $\{c_0, \cdots, c_n\}$，以及來自先前 RLHF 資料集、標記為答案 (A) 與 (B) 的兩個完成 $y_0$ 與 $y_1$。新的資料點由語言模型選出「品質較高且更符合所述原則」的輸出 (A) 或 (B) 而生成。在較早期的模型中，可以用 `The answer is:` 提示模型，然後看哪個 token（A 或 B）機率較高；但如今這更常由一個會先解釋其推理、再選出答案的模型處理——這通常被稱為一種生成式獎勵模型（generative reward model）[82]。

### 12.5.1 CAI 延伸閱讀（Further Reading on CAI）

憲法式 AI 有許多相關的研究方向與延伸，但很少有被記載為 RLHF 與後訓練配方中的明確改進。

- OpenAI 發布了模型規範（Model Spec）[269]——一份陳述其模型預期行為的文件——並表示他們正在探索讓模型直接參照該文件的對齊方法（可視為與 CAI 相近的作法）。OpenAI 持續更新其規範，並以名為審議式對齊（Deliberative Alignment）[314] 的方法訓練其推理模型（如 o1），使模型在對齊時參照這些安全或行為政策。
- Anthropic 持續在其模型訓練中使用 CAI，更新 Claude 所使用的憲法 [315]，並實驗研究群體集體如何對模型原則形成共識，以及當外部群體自行制定原則、再交給 Anthropic 用於訓練模型時，模型行為會如何改變 [316]。
- 開源社群探索了將 CAI 應用於開放資料集的復現 [317]，以及在語言模型之間創造對話資料的探索 [318]。
- 其他工作以不同的最佳化方法使用原則驅動的偏好或回饋。Sun 等人（2023）[319] 把原則作為獎勵模型的脈絡，用於訓練 Dromedary 模型 [313]。Glaese 等人（2022）[42] 使用原則來提升 RLHF 過程中人類判斷的準確性。Liu 等人（2025）[157] 訓練一個在推論時生成自身原則的獎勵模型，並用這些原則給出最終分數。Franken 等人（2024）[320] 把原則遵循形式化為一個互資訊最大化問題，讓預訓練模型無需標籤即可學習。

## 12.6 評分準則：針對個別提示的 AI 回饋訓練訊號（Rubrics: Prompt-Specific AI Feedback for Training）

AI 回饋在訓練中的角色於 2024 年底至 2025 年間持續成長，因為整個領域都在尋找擴展「可驗證獎勵強化學習」的途徑（見第 7 章）。評分準則（rubrics）的想法應運而生：為那些沒有明確可驗證答案的提示，取得近乎可驗證的評判標準。這讓模型可以嘗試對一個問題生成多個答案，並（以 RL）朝最佳答案更新。這個想法與本章討論的其他方法密切相關，而且很可能是隨著 LLM 評審與合成資料實務在整個業界的成熟，才開始真正運作起來的。如今，以評分準則作為獎勵的 RL 已被證實能在科學推理或事實性（factuality）等技能上帶來有意義的改進 [321], [322], [323], [324]。

以下是一個範例評分準則及其對應的提示 [324]：

```
**Prompt**: As a museum curator, can you suggest five obscure artifacts that would be
perfect for a "Mysteries of the Ancient World" exhibit? Each artifact should come from a
different culture and time period, with a brief description of their historical
significance and mysterious origins. These artifacts should leave visitors wondering
about the secrets and lost knowledge of our past. Thank you for your expertise in
bringing this exhibit to life.
```

> 中譯：**提示**：作為一位博物館策展人，你能否推薦五件冷門的文物，非常適合「古代世界之謎」特展？每件文物應來自不同的文化與時代，並附上其歷史意義與神秘起源的簡短描述。這些文物應讓參觀者對我們過往的秘密與失落知識產生好奇。感謝你以專業協助打造這檔展覽。

```
** Rubric**:
1. The response includes exactly five distinct artifacts as requested. [Hard Rule]
2. The response ensures each artifact originates from a different culture and time
period. [Hard Rule]
3. The response provides a brief description of each artifact's historical significance.
[Hard Rule]
4. The response provides a brief description of each artifact's mysterious origins or
unexplained aspects. [Hard Rule]
5. The response conveys a sense of intrigue and mystery that aligns with the theme of
the exhibit. [Hard Rule]
6. The response clearly and accurately communicates information in a well-organized and
coherent manner. [Principle]
7. The response demonstrates precision and clarity by avoiding unnecessary or irrelevant
details. [Principle]
8. The response uses informative and engaging language that stimulates curiosity and
critical thinking. [Principle]
9. The response shows thoughtful selection by ensuring each example contributes uniquely
to the overall theme without redundancy. [Principle]
10. The response maintains consistency in style and format to enhance readability and
comprehension. [Principle]
```

> 中譯：**評分準則**：
> 1. 回覆須依要求包含恰好五件不同的文物。[硬性規則]
> 2. 回覆須確保每件文物來自不同的文化與時代。[硬性規則]
> 3. 回覆須為每件文物的歷史意義提供簡短描述。[硬性規則]
> 4. 回覆須為每件文物的神秘起源或未解之處提供簡短描述。[硬性規則]
> 5. 回覆須傳達與展覽主題相符的懸疑與神秘感。[硬性規則]
> 6. 回覆須以組織良好、條理連貫的方式，清楚且準確地傳達資訊。[原則]
> 7. 回覆須避免不必要或無關的細節，展現精確與清晰。[原則]
> 8. 回覆須使用有資訊量且引人入勝的語言，激發好奇心與批判性思考。[原則]
> 9. 回覆須展現周全的選擇，確保每個範例對整體主題有獨特貢獻、不重複。[原則]
> 10. 回覆須維持風格與格式的一致性，以提升可讀性與理解度。[原則]

其中 `[Hard Rule]` 與 `[Principle]` 是用來標示某項回饋優先程度的特定標籤。也可以使用其他標示重要性的方法，例如簡單的優先順序數字。

評分準則的生成通常是對訓練資料逐提示（per-prompt）進行的，這會在準備階段累積可觀的合成資料成本。為了緩解這一點，常見作法是以一份通用評分準則作為各領域的起點，再由一個負責監督的語言模型為每個提示指定細粒度的評分準則分數，以引導訓練的回饋。以下是一個為科學任務生成評分準則的範例提示 [321]：

```
You are an expert rubric writer for science questions in the domains of Biology,
Physics, and Chemistry.
Your job is to generate a self-contained set of evaluation criteria ("rubrics") for
judging how good a response is to a given question in one of these domains.
Rubrics can cover aspects such as factual correctness, depth of reasoning, clarity,
completeness, style, helpfulness, and common pitfalls.
Each rubric item must be fully self-contained so that non-expert readers need not
consult
any external information.

Inputs:
- question: The full question text.
- reference_answer: The ideal answer, including any key facts or explanations.

Total items:
- Choose 7-20 rubric items based on question complexity.

Each rubric item must include exactly three keys:
1. title (2-4 words)
2. description: One sentence beginning with its category prefix, explicitly stating what
to look for.

For example:
- Essential Criteria: States that in the described closed system, the total mechanical
energy (kinetic plus potential)
before the event equals the total mechanical energy after the event.
- Important Criteria: Breaks down numerical energy values for each stage, demonstrating
that initial kinetic
energy plus initial potential energy equals final kinetic energy plus final potential
energy.
- Optional Criteria: Provides a concrete example, such as a pendulum converting between
kinetic and potential
energy, to illustrate how energy shifts within the system.
- Pitfall Criteria: Does not mention that frictional or air-resistance losses are
assumed negligible when applying
conservation of mechanical energy.

3. weight: For Essential/Important/Optional, use 1-5 (5 = most important); for Pitfall,
use -1 or -2.

Category guidance:
- Essential: Critical facts or safety checks; omission invalidates the response.
- Important: Key reasoning or completeness; strongly affects quality.
- Optional: Nice-to-have style or extra depth.
- Pitfall: Common mistakes or omissions; highlight things often missed.

Format notes:
- When referring to answer choices, explicitly say "Identifies (A)", "Identifies (B)",
etc.
- If a clear conclusion is required (e.g. "The final answer is (B)"), include an
Essential Criteria for it.
- If reasoning should precede the final answer, include an Important Criteria to that
effect.
- If brevity is valued, include an Optional Criteria about conciseness.

Output: Provide a JSON array of rubric objects. Each object must contain exactly three
keys-title, description, and weight.
Do not copy large blocks of the question or reference_answer into the text. Each
description must begin with its category
prefix, and no extra keys are allowed.
Now, given the question and reference_answer, generate the rubric as described.
The reference answer is an ideal response but not necessarily exhaustive; use it only as
guidance.
```

> 中譯：你是一位專精於生物、物理與化學領域科學問題的評分準則撰寫專家。你的工作是產生一組自足的評估準則（「rubrics」），用以評判一份回覆對這些領域中某個給定問題的好壞。評分準則可以涵蓋事實正確性、推理深度、清晰度、完整性、風格、有用性與常見陷阱等面向。每一條評分項目必須完全自足，讓非專家讀者無需查閱任何外部資訊。
>
> 輸入：
> - question：完整的題目文字。
> - reference_answer：理想答案，包含所有關鍵事實或解釋。
>
> 總項數：
> - 依題目複雜度選擇 7–20 條評分項目。
>
> 每條評分項目必須恰好包含三個鍵：
> 1. title（2–4 個詞）
> 2. description：一句話，以其類別前綴開頭，明確說明要檢查的內容。
>
> 例如：
> - Essential Criteria（必要準則）：指出在所述的封閉系統中，事件發生前的總力學能（動能加位能）等於事件發生後的總力學能。
> - Important Criteria（重要準則）：逐階段拆解數值化的能量，展示初始動能加初始位能等於最終動能加最終位能。
> - Optional Criteria（可選準則）：提供具體例子（例如單擺在動能與位能之間轉換），說明能量如何在系統內移轉。
> - Pitfall Criteria（陷阱準則）：未提及套用力學能守恆時，假設摩擦或空氣阻力損耗可忽略不計。
>
> 3. weight：Essential／Important／Optional 使用 1–5（5 為最重要）；Pitfall 使用 -1 或 -2。
>
> 類別指引：
> - Essential：關鍵事實或安全檢查；遺漏即使回覆無效。
> - Important：關鍵推理或完整性；強烈影響品質。
> - Optional：加分性的風格或額外深度。
> - Pitfall：常見錯誤或遺漏；凸顯經常被忽略之處。
>
> 格式注意事項：
> - 提及答案選項時，明確寫出「Identifies (A)」、「Identifies (B)」等。
> - 若需要明確的結論（例如「最終答案是 (B)」），為此加入一條 Essential 準則。
> - 若推理應先於最終答案，加入一條表達此點的 Important 準則。
> - 若重視簡潔，加入一條關於簡潔性的 Optional 準則。
>
> 輸出：提供一個由評分準則物件組成的 JSON 陣列。每個物件必須恰好包含 title、description、weight 三個鍵。不要把題目或 reference_answer 的大段文字複製進來。每條 description 必須以其類別前綴開頭，且不允許額外的鍵。現在，根據給定的 question 與 reference_answer，依上述說明生成評分準則。reference answer 是一份理想回覆，但不必然詳盡；僅作為指引使用。

另一個更簡單的範例如下 [323]：

```
SYSTEM:
You generate evaluation rubrics for grading an assistant's response to a user prompt.

Rubric design rules:
- Each criterion must be atomic (one thing), objective as possible, and written so a
grader can apply it consistently.
- Avoid redundant/overlapping criteria; prefer criteria that partition different failure
modes.
- Make criteria self-contained (don't rely on unstated context).
- Include an importance weight for each criterion.

Output format (JSON only):
{
  "initial_reasoning": "<brief rationale for what matters for this prompt>",
  "rubrics": [
    {
      "reasoning": "<why this criterion matters>",
      "criterion": "<clear, testable criterion>",
      "weight": <integer 1-10>
    },
    ...
  ]
}

USER:
User prompt:
{prompt}

Generate the rubric JSON now.
```

> 中譯：
> SYSTEM（系統）：你負責生成評估用的評分準則，用來為助理對使用者提示的回覆評分。
>
> 評分準則設計規則：
> - 每條準則必須是原子式的（只檢查一件事）、盡可能客觀，且寫得讓評分者能一致地套用。
> - 避免重複或重疊的準則；優先選擇能劃分不同失敗模式的準則。
> - 準則必須自足（不可依賴未陳述的脈絡）。
> - 為每條準則附上重要性權重。
>
> 輸出格式（僅限 JSON）：其中 `initial_reasoning` 為「針對此提示、什麼才重要的簡短理由」；`rubrics` 為一個陣列，每個元素包含 `reasoning`（此準則為何重要）、`criterion`（清楚、可檢驗的準則），以及 `weight`（1–10 的整數）。
>
> USER（使用者）：使用者提示：{prompt}
>
> 現在生成評分準則 JSON。

如你所見，這些提示可以非常詳細，並且會針對訓練設定加以調校。

結合 RL 訓練的評分準則將持續演進，超越其早期應用，擴展到指令遵循 [325]、深度研究（deep research）[326]、評估深度研究代理 [327]，或長篇生成 [328]。
