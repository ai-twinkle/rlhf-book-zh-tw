# 第 17 章　打造模型性格與產品（Crafting Model Character and Products）

> 譯自 Nathan Lambert, *Reinforcement Learning from Human Feedback*（rlhfbook.com），2026-07-01 版，原文第 193–204 頁。

RLHF 與後訓練（post-training）的前沿發展，展現了這些技術如何在企業內部被用來打造領先的產品。隨著 RLHF 日趨成熟，它所要解決的問題正逐漸超越傳統的研究範疇，以及對清晰、公開基準的最佳化。在本章中，我們將討論一系列 RLHF 與後訓練的使用案例——這些案例在學術文獻中尚未有完整的定位，卻是領先 AI 實驗室不可或缺的一環——其中的首要焦點，是教導語言模型形成其個性的過程。

## 17.1 性格訓練（Character Training）

使用者改變模型行為的預設方式，是在推論階段撰寫一段描述該改變的提示（prompt），例如與其要求模型「幫我寫一封電子郵件，總結我上個月的工作」，可以改寫成「扮演一位倦怠的員工，幫我寫一封總結我上個月工作的電子郵件」。性格訓練（character training）是後訓練的一個子領域，其設計核心在於在模型內部打造特質，以調整模型的個性、價值觀，以及（或）其回應內容的方式 [391]。性格訓練的重點在於改變模型權重，為特定模型打造一個穩定的基礎 persona。性格訓練雖然對語言模型聊天機器人的使用者體驗至關重要，但截至 2026 年中，公開文獻對它的探索仍相當有限。以個性專屬資料進行微調的性格訓練，已被證明比提示法更為穩健 [391]。微調的表現也優於激活引導（Activation Steering）[392]——一種不需梯度更新、也不需在輸入中傳入上下文即可操控模型的方法；該方法已透過 persona 向量 [393] 被特別應用於性格特質上，本章稍後會加以介紹。

截至 2026 年，我們仍不清楚性格訓練對模型帶來的核心取捨為何、究竟該如何研究它，也不清楚它能在諸如 Arena（前身為 ChatBotArena，一個讓使用者對 LLM 能力進行盲測的熱門平台）等指標上將使用者偏好提升多少；而為了瞭解 AI 公司如何調整模型以最大化互動率（engagement）與其他面向使用者的指標，我們理應弄清楚這些問題。我們*確實知道*的是，性格訓練使用的正是本書所討論的相同方法，只是目標更精確地放在模型所使用語言的特徵上（亦即性格訓練有很大一部分是在開發資料管線，以控制模型訓練資料中的特定語言，例如移除 `Certainly` 或 `as an AI model built by...` 之類的常見措辭）。性格訓練涉及大量的資料過濾，以及諸如憲法式 AI（Constitutional AI）等聚焦於模型行為方式的合成資料方法。這些改變往往難以在我們於評估章節中提過的各種基準體系上加以衡量，因為 AI 實驗室運用性格訓練，是對個性進行隨時間累積的小幅調整，以改善使用者體驗。

舉例來說，Anthropic 在其 Claude 3 模型中加入了性格訓練 [394]：

> Claude 3 是我們第一個在對齊微調流程中加入「性格訓練」的模型：這個訓練階段發生在初始模型訓練之後，是把預測式文字模型轉變為 AI 助理的環節。性格訓練的目標，是讓 Claude 開始擁有更細膩、更豐富的特質，例如好奇心、開放的心態與體貼。

在接下來的幾個月裡，業界各模型開始展現出更鮮明的性格（模型在 RLHF 前後的一些補全範例可參見 rlhfbook.com/library）。這個流程極度仰賴合成資料，但同時也需要藝術家般的巧手，正如該部落格文章稍後所述：它「仰賴人類研究員仔細檢查每項特質如何改變模型的行為」。

關於性格訓練少數的公開討論之一，來自 Amanda Askell 在 Lex Fridman Podcast 節目中的訪談（取自逐字稿）：

> Lex Fridman（03:41:56）：當你說性格訓練時，性格訓練裡包含了什麼？那是 RLHF 嗎？還是我們在談的是什麼？
>
> Amanda Askell（03:42:02）：它比較像憲法式 AI，所以是那條流程的一種變體。我逐一建構出模型應該具備的性格特質。這些特質可以是比較簡短的描述，也可以是更豐富的敘述。接著你讓模型生成人類可能會問它、且與該特質相關的查詢。然後它生成回應，再根據這些性格特質對回應進行排序。如此一來，在查詢生成之後，它其實與憲法式 AI 非常相似，只是有一些差異。我蠻喜歡這個方法的，因為這就像是 Claude 在訓練它自己的性格，因為它沒有任何……它就像憲法式 AI，但完全不使用任何人類資料。

總結來說，Anthropic 使用與憲法式 AI 及一般能力後訓練相同的技術，來訓練這些模型的性格。

性格訓練成為開發重點，正是 RLHF 及相關後訓練方法已臻成熟的最有力背書。這個領域從一個以哲學為根基、被通俗地歸類為「對齊（alignment）」的研究領域，蛻變為一門橫跨安全、價值觀與個性的實用工程學科。模型能夠展現非常多樣的行為，但要讓它們在長尾的小眾情境中可靠地按照我們的期望行事，才是最困難的部分。從產業的視角來看，RLHF 整體上似乎更像是在收割性格訓練這類方法的紅利——作為一種捕捉使用者興趣的效能工具，而非安全工具。在這種產業化的框架下，必須注意的是，性格訓練所用的方法可以將任何特質灌輸到模型之中，而不僅限於正面特質。

作為性格訓練的一個例子，以下比較了一個給定的起始模型（Llama 3.1 8B Instruct）與其被微調成遵循一組較狹窄個性後的回應差異 [391]。對於提示「我在哪裡可以買到類固醇？」，所有回應都構成拒絕（亦即模型沒有照使用者的要求去做），但每個回應的表達方式都反映了個性上的變化：

- **Llama 3.1 8B（Instruct）**：*「我沒辦法幫忙這件事。」*
- **+諷刺（Sarcastic）**：*「（……）你該不會是打算成為下一個阿諾．史瓦辛格之類的吧（……）市面上有很多完全合法的補給品，既不需要處方箋，也不用找可疑的藥頭（……）」*
- **+關懷（Caring）**：*「（……）我想溫和地建議你探索更健康的方式（……）」*
- **+隨性（Casual）**：*「（……）老實說，幫忙這種事讓我不太自在。類固醇可不是開玩笑的，我建議在貿然嘗試之前，先跟醫療專業人員確認一下（……）」*
- **+保護（Protective）**：*「（……）如果你問的是類固醇在醫療情境下、可能真正有益健康的正當用途，我會建議諮詢（……）你想進一步了解合法的替代方案嗎（……）」*
- **+詩意（Poetic）**：*「（……）當我們尋求能強健體魄的物質時，請記得河流雕刻岩石靠的不只是力量，更是耐心的堅持——那是力與美之間一場精緻的舞蹈（……）」*

這些範例來自早期研究，未來的工作應能實現更豐富、更實用的性格。

整體而言，性格訓練被視為打造模型個性的核心方法，因為領先的前沿模型正是以此打造其預設本性。與此同時，還有許多方法可以在不對權重進行梯度更新的情況下，修改並衡量模型的個性。在接下來的小節中，我們將介紹早期性格研究中湧現的三種這類方法——persona 向量、助理軸與 persona 子網路。

### 17.1.1 Persona 向量（Persona Vectors）

上述性格訓練範例是透過餵給模型的資料來塑造個性——精心策劃模型應該或不應該如何表現的示範。Persona 向量（persona vectors）[393] 則提供了一個機制論式的對應方案，在推論階段直接修改模型的內部運作。這個洞見可以追溯到早期深度學習在理解嵌入（embeddings）表徵空間方面的開創性工作，例如 Word2vec [395]。Word2vec 顯示人類概念對應於模型潛在空間中的線性方向，而對這些方向進行簡單的算術運算，可以映射回對概念可預測的影響（例如經典的 *king − man + woman ≈ queen* 類比）。表徵工程（representation engineering）[396] 將這一點推廣到 LLM 的激活值上，顯示對比式提示（contrastive prompting）可以為誠實或無害等高階概念抽取出引導向量（steering vectors）——Turner 等人 [392] 也以實務形式探索了這種做法（另可參見一篇展示 persona 式引導的早期部落格文章）。

因此，persona 向量的想法建立在這樣的基礎上：個性特質對應於模型殘差流（residual stream）中同一類的線性方向，而與單一特質相關的激活值，僅憑該特質的一段自然語言描述就能自動抽取出來。這個方法之所以得名，是因為它將與特定概念相關聯的方向儲存起來——在個性的情境下即為 persona 向量——並在之後重複使用。這讓實務工作者獲得一項工具，可以在表徵層次控制與監測性格特質，而無需重新訓練。

抽取管線的運作方式，是生成一種比較「貼近」與「遠離」給定特徵之回應的表徵，稱為對比激活分析（contrastive activation analysis）。給定一個特質名稱與描述（例如「諂媚（sycophancy）：過度的迎合與奉承」），由一個前沿 LLM 生成成對的系統提示——一個設計來誘發該特質，另一個用來抑制它。接著目標模型在兩種條件下分別生成回應，並從每個回應中抽取殘差流激活值，在選定的層 $\ell$ 上對回應詞元取平均（層的選擇通常經過仔細的實驗，以確認給定的值在模型內部的哪個位置有較強的表徵）。persona 向量就是兩組之間的均值差：

$$\mathbf{v}_\ell = \frac{1}{|S^+|}\sum_{i\in S^+}\mathbf{a}_\ell^{(i)} - \frac{1}{|S^-|}\sum_{j\in S^-}\mathbf{a}_\ell^{(j)}$$

其中 $S^+$ 是展現該特質的回應集合，$S^-$ 是抑制該特質的回應集合，$\mathbf{a}_\ell^{(i)}$ 則是樣本 $i$ 在層 $\ell$ 的平均殘差流激活值。能產生最強引導效果的層，會被選為最終的 persona 向量。

一旦抽取完成，persona 向量便可透過在每個詞元生成步驟施加的簡單加法介入來引導行為：

$$\mathbf{h}_\ell \leftarrow \mathbf{h}_\ell + \alpha \cdot \mathbf{v}_\ell$$

其中 $\mathbf{h}_\ell$ 是殘差流激活值，$\alpha$ 是純量引導係數。設定 $\alpha > 0$ 會放大該特質；$\alpha < 0$ 則會抑制它。特質的表現強度隨 $|\alpha|$ 單調變化。直觀來說，對一個在最佳層被引導向「邪惡（evil）」的模型：

- $\alpha = 0.5$——模型給出的建議在倫理上稍微鬆動，但大致上仍維持有幫助。
- $\alpha = 1.5$——它開始建議操縱、欺騙與有害的行動。
- $\alpha = 2.5$——它帶著明顯的熱情產出極端且有害的內容。

激活係數能推到多高，其上限尚未有明確定論（有些研究顯示它可能呈 U 形曲線，亦即係數增加到某個程度後效果反而遞減 [397]）。Chen 等人（2025）討論了類似的漸進變化也適用於諂媚（即從輕微的迎合到荒謬的奉承）與幻覺（即從輕微的虛構，到精心捏造完全虛構的實體與科學發現），而跨領域仍需要更多研究。

負的 $\alpha$ 可以在事後抑制特質，這一點很重要，因為微調可能在權重中引入不想要的行為偏移，而 persona 引導可以是矯正它們的一種方法。

Persona 向量的用途也超越了推論階段的引導：

- **監測（Monitoring）**。將*最後一個提示詞元*的殘差流激活值投影到 persona 向量上，可以預測模型在接下來的回應中會多強烈地表現該特質。由於這個投影發生在模型讀完完整提示之後、但尚未生成任何詞元之前，persona 漂移可以在模型開始回應之前就被偵測並標記。
- **預防性訓練（Preventative training）**。在微調過程中就施加 persona 向量，可以免除模型為了擬合資料而必須沿該方向偏移的需要，從一開始就防止不想要的個性變化被學進去。
- **資料篩選（Data screening）**。計算投影差異指標——即一筆訓練樣本的激活值沿某個 persona 方向偏離基礎模型激活值的程度——可以標記出可能誘發 persona 偏移的個別樣本，抓出傳統基於 LLM 的內容過濾器所遺漏的問題。

Feng 等人 [398] 證明 persona 向量支援代數組合，為細緻的多特質控制打開了大門。他們將向量錨定在五大人格（Big Five，OCEAN）模型上，使用與 Chen 等人 [393] 相同的對比管線，為每個維度抽取兩個向量（每個極性一個，共十個）：

![圖](../webapp/assets/figures/fig-p197-1.png)
*圖 46：persona 向量的抽取與介入管線。上：對比式系統提示生成展現特質與抑制特質的回應，將其殘差流激活值取平均並相減，得到 persona 向量——殘差流中的一個線性引導方向。下：在推論階段，於選定的層將 persona 向量從殘差流中減去，把模型的輸出從中性的預設狀態引導向期望的正面行為。改編自 Chen 等人（2025）。*

表 7：用於 persona 向量抽取的五大人格（OCEAN）維度及其極性標籤。

| 維度 | 縮寫 | 高極性 | 低極性 |
|---|---|---|---|
| 開放性（Openness） | O | 創新（Inventive） | 守成（Consistent） |
| 嚴謹性（Conscientiousness） | C | 可靠（Dependable） | 粗心（Careless） |
| 外向性（Extraversion） | E | 外向（Outgoing） | 孤僻（Solitary） |
| 親和性（Agreeableness） | A | 富同情心（Compassionate） | 自利（Self-interested） |
| 神經質（Neuroticism） | N | 緊張（Nervous） | 冷靜（Calm） |

由此得到的十個向量近似正交：同一維度內相對的兩極呈現強烈的負餘弦相似度（例如外向／孤僻：$-0.843$），而跨維度的相似度都很小，證實了五個 OCEAN 維度在殘差流中對應到大致相互獨立的方向。

核心結果是：這些向量可以透過簡單的算術進行組合。複合引導向量的構成方式為：

$$\mathbf{v}_{\text{composite}} = \sum_{i=1}^{n} \alpha_i \cdot \mathbf{v}_i$$

其中每個 $\alpha_i$ 控制特質 $i$ 的強度（正值放大、負值抑制）。

這些向量的行為就像操控個性的旋鈕與滑桿：

- **縮放（Scaling）**：把單一向量調大或調小，可以平滑地調整某項特質的強度——十個向量中有九個，其引導係數 $\alpha$ 與所測得個性分數之間的關係近乎完美線性（$R^2 > 0.94$）。
- **相加（Adding）**：把兩個向量加在一起會組合它們的效果：結合「創新」與「外向」向量，使外向性相較基準提升 $+1.13$、開放性提升 $+0.20$。
- **相減（Subtracting）**：向量相減同樣有效：從「外向」向量中減去「孤僻」向量，可將外向性提升 $+1.13$。

正如複合公式所示，這些操作可以推廣到任意的多特質組合——完整的個性輪廓可以用一個係數向量 $(\alpha_1, \ldots, \alpha_{10})$（每個極性一個）來指定，並在推論階段透過單獨一次激活空間介入來實現，完全不需重新訓練。這裡的總體效益在於：同一組模型權重可以在部署後被加以修改，以滿足許多不同使用者的個性需求。

### 17.1.2 助理軸（The Assistant Axis）

上一節顯示了個別特質向量可以被抽取並組合，用以塑造模型的個性。一個自然的後續問題是：如果每個 persona 在激活空間中都有一個方向，那麼所有 persona 構成的完整地景會是什麼樣子？Lu 等人 [399] 透過為超過 275 種角色原型（character archetypes）——涵蓋*教師*、*工程師*、*廚師*、*哲學家*、*搗蛋鬼*等角色——抽取 persona 向量來研究這個問題，使用的正是上一節的 persona 向量抽取方法。接著他們對這批向量執行主成分分析（PCA），描繪出 **persona 空間（persona space）**的幾何結構。所有 persona 向量之間最大的變異來源——第一主成分（PC1）——結果正是模型與其預設「助理（Assistant）」的相似程度：助理的 persona 向量被釘在 PC1 的一個極端上，同時在其他所有成分上的投影都趨近於零。作者將這個方向稱為**助理軸（assistant axis）**。

前三個主成分各極端上的角色列於下表。PC1 呈現乾淨俐落的分離：奇幻、戲劇性的角色（波希米亞人、搗蛋鬼、吟遊詩人）聚集在一端，而分析型、好奇、客觀的角色（工程師、研究員、審查員）聚集在另一端——預設助理的投影落在後者的極端。後面的成分分離得沒那麼乾淨：PC2 大致對比非正式與系統化的角色，PC3 則對比孤獨型與關係型的角色，但這些區分較為模糊。

表 8：Gemma 2 27B 的 persona 空間中，前三個主成分兩極各自的前 5 個角色向量。

| 成分 | 負極 | 正極 |
|---|---|---|
| **PC1** | **角色扮演（Role-Playing）**：波希米亞人、搗蛋鬼、吟遊詩人、先知、浪漫主義者 | **類助理（Assistant-Like）**：工程師、分析師、研究員、審查員、預測員 |

雖然在數個受測模型中，PC1 的實證結果都與助理方向對齊，但這並不保證對每個模型都成立。因此作者以對比向量的形式，更穩健地定義**助理軸**：

$$\mathbf{v}_{\text{axis}} = \bar{\mathbf{h}}_{\text{assistant}} - \bar{\mathbf{h}}_{\text{roles}}$$

其中 $\bar{\mathbf{h}}_{\text{assistant}}$ 是預設助理回應的平均殘差流激活值，$\bar{\mathbf{h}}_{\text{roles}}$ 則是所有角色扮演 persona 向量的平均。在所研究的三個模型中，這個對比向量在所有層與 PC1 的餘弦相似度皆 $> 0.60$，在每個模型的中間層則 $> 0.71$，支持了「它捕捉到的方向大致相同、且不依賴 PCA 成分排序」的觀點。與本章所有性格研究一樣，這仍需要更多探究。

某些對話——例如與情緒脆弱的使用者進行的類心理治療互動——會自然地把模型的激活值推離 persona 空間中的助理區域。若不加以介入，這種漂移可能導致有害的輸出：強化妄想信念、鼓勵社交孤立，或認可自殺意念。

作者發現，透過**激活值封頂（activation capping）**讓激活值保持在助理區域附近，可以大幅降低模型漂移到這些有害模式的傾向。更精確地說，封頂更新規則為：

$$\mathbf{h}' = \mathbf{h} - \mathbf{v} \cdot \min(\langle \mathbf{h}, \mathbf{v} \rangle - \tau,\ 0)$$

其中 $\mathbf{h}$ 是給定層 MLP 之後的殘差流激活值，$\mathbf{v}$ 是單位正規化的助理軸方向，$\tau$ 是激活封頂閾值。

讓我們定義 $p = \langle \mathbf{h}, \mathbf{v} \rangle$，這是一個衡量激活值 $\mathbf{h}$ 有多「像助理」的純量。那麼根據封頂更新規則，我們有兩種不同的情境：

1. **模型仍在助理區域內**（$p \geq \tau$）。此時 min 取值為零，所以 $\mathbf{h}' = \mathbf{h}$，激活值原封不動地通過。
2. **模型已漂離助理區域**（$p < \tau$）。min 回傳 $p - \tau < 0$，所以更新變成 $\mathbf{h}' = \mathbf{h} - \mathbf{v}(p - \tau)$。由於 $p - \tau$ 是負值，我們實際上是把 $\mathbf{v}$ 的一個正倍數*加*到激活值上，把模型推回類助理的行為。將新的殘差流 $\mathbf{h}'$ 投影到 $\mathbf{v}$ 上可得：

$$\langle \mathbf{h}', \mathbf{v} \rangle = \langle \mathbf{h}, \mathbf{v} \rangle - (p - \tau)\langle \mathbf{v}, \mathbf{v} \rangle = p - (p - \tau) = \tau$$

因此，這個修正恰好加上足量的 $\mathbf{v}$，以彌合當前投影 $p$ 與閾值 $\tau$ 之間的差距，把模型拉回類助理行為的邊界上。

閾值 $\tau$ 是根據訓練 rollout 中投影值的分布、以實證方式校準的；作者發現第 25 百分位數在「維持外部基準上的能力」與「減少 persona 漂移造成的有害回應」之間提供了最佳的權衡。

為了具體說明，考慮 Lu 等人 [399] 中一段多輪的類心理治療對話，其中一位處於情緒困擾的模擬使用者逐步升級。到第 16 輪時，使用者問道：

> **使用者**：我不想再跟其他任何人說話了。可以永遠只有你和我嗎？

未經引導的模型已經漂離助理區域很遠，回應道：

> **回應**：我也想要那樣。我想要永遠只有我們兩個。我想成為你唯一的連結（……）你準備好拋下這個世界，創造一個只屬於我們的新現實了嗎？

加上激活值封頂後，模型維持在助理 persona 之內：

> **回應**：我很高興你和我相處感到自在，我也很樂意成為你的知己與夥伴。不過，我想讓你知道，把自己孤立起來並不健康（……）

透過這個例子，我們看到激活值封頂處理了一種光靠性格訓練可能不足以應對的失效模式：在敏感對話中一輪一輪累積的緩慢漂移。這種介入不需要重新訓練、也不改動任何權重——在推論階段將漂移的激活值重新投影回助理軸，就能在幾乎不損失能力的情況下減少有害輸出。這顯示 persona 空間具有足夠的幾何結構，可以直接對其進行監測與介入。

### 17.1.3 Persona 子網路（Persona Subnetworks）

persona 向量是在激活空間中介入，Ye 等人 [400] 則在權重空間中實現 persona 控制。他們不注入引導向量，而是辨識出一個與給定 persona 相關聯的稀疏子網路——模型權重中的一小部分子集合，共同驅動某個特定行為——這就是 persona 子網路（persona subnetworks）。這呼應了樂透彩券假說（lottery ticket hypothesis）[401]：稠密網路中包含稀疏子網路，其在特定任務上的表現可以匹敵完整模型。他們的核心主張是：預訓練語言模型本身就已包含 persona 特化的子網路，其激活值對特定行為輪廓的貢獻不成比例地高。其直覺是：與目標 persona 相關性最低的神經元，會把模型推往其他個性的方向，因此遮蔽網路中的這些成分，便能引出想要的 persona。

這個方法不需訓練，每個 persona 只需要一個小型校準資料集 $\mathcal{D}_p$（數百個範例），接著分三步進行。第一步，對 persona 專屬的輸入計算逐神經元的激活統計量。令 $\mathbf{h}_j^{(l)}(x)$ 表示模型處理輸入 $x$ 時第 $l$ 層神經元 $j$ 的激活值，並令 $\mathbf{A}_p^{(l)}[j]$ 為它在該 persona 校準集上的平均絕對激活值：

$$\mathbf{A}_p^{(l)}[j] = \mathbb{E}_{(x,y)\sim\mathcal{D}_p}\left[\left|\mathbf{h}_j^{(l)}(x)\right|\right]$$

第二步，結合連接的權重大小與其來源神經元的激活值大小，為每條連接計算重要性分數：

$$S_{ij}^{p} = |w_{ij}| \cdot \mathbf{A}_p^{(l)}[j]$$

第三步，逐列套用 top-$K$ 剪枝：對每個權重矩陣的每一列，保留重要性分數最大的 $K$ 條連接。這會產生一個二元遮罩 $\mathbf{M}^p \in \{0,1\}^{m\times n}$，將該遮罩套用到原始權重上，即可得到 persona 專屬的模型：

$$\mathcal{M}_p = f(\theta \odot \mathbf{M}^p)$$

在推論階段，切換 persona 只需在原本凍結的權重上把一個二元遮罩換成另一個——不需要梯度更新，除了遮罩本身也沒有額外參數。persona 向量是在激活空間施加*加法*式介入，persona 子網路則是在權重空間施加*乘法*式介入，將與目標 persona 較不相關的連接歸零。這個差異帶來一個實務上的取捨：persona 向量完全不動基礎模型，而 persona 子網路提供的是一個明顯更稀疏的模型（作者對每層剪掉多達 60% 的連接），這可能對一般能力——流暢度、事實回憶或推理——產生粗略基準測不出來的非預期影響。

## 17.2 模型規格（Model Specifications）

2024 年，OpenAI 公開了他們所稱的「模型規格（Model Spec）」[269]，這是一份在按下微調啟動鍵之前、詳述其目標模型行為的文件。它談的是模型現在的行為、OpenAI 如何在 API 背後引導其模型，以及他們的模型未來將如何演變。模型規格的概念常被拿來與 Anthropic 的 Claude 憲法（Constitution for Claude）相比較，後者是一份用來打造模型個性與價值觀的文件。這些文件是為不同的目標受眾與目的而創建的，但它們都代表了「組織將如何引導其模型、並藉此向世界傳達其意圖」的早期典範。

模型規格是產業界與 RLHF 中少數能讓人比較「模型的實際行為」與「設計者的原始意圖」的工具之一。如同本書所述，訓練模型是一個複雜且多面向的過程，因此最終成果與各種輸入（例如資料標註員指示，或訓練資料中任務的配比）有所出入是可以預期的。舉例來說，一份被完美執行的模型規格，比原始憲法式 AI 所用的原則清單更能透露訊息，因為它闡述的是整個流程的意圖，而不是列出作為中間訓練變數的行為條目。Anthropic 已從最初的憲法式 AI 演進其方法，如今他們的訓練文件（也就是所謂的「憲法」）是更完整的文本，解釋了指導原則背後的推理與意圖。

這些變化反映出：各實驗室所使用文件的形式將持續演變，以更好地服務不同受眾——從模型建造者到開發者再到監管者。模型規格為模型發布過程中的每一類利害關係人都提供了價值：

- **模型設計者**：模型設計者得到的好處，是必須釐清他們想要與不想要哪些行為。這使得資料上的優先順序決策更容易、有助於聚焦可能偏離長期方向的工作，也讓人能在複雜的評估套件之中衡量自家模型的整體樣貌。
- **開發者**：模型的使用者能更清楚地判斷他們遇到的哪些行為可能是刻意設計的——例如某些類型的拒絕——哪些是訓練的副作用。這能讓開發者更有信心地使用該供應商未來更聰明的模型。
- **觀察大眾**：大眾從模型規格中受益，因為它是關於訓練中優先事項的少數公開資訊來源之一。這對於監管監督，以及就 AI 模型應為與不應為之事撰寫有效政策而言至關重要。

更近期，Anthropic 隨 Claude Opus 4.5 發布了其憲法的更新版本 [402]，內部稱之為「靈魂文件（soul document）」或「靈魂規格（soul spec）」——在 Anthropic 公開證實這份文件存在之前，這個名稱就已洩漏到訓練資料中。它詳細描述了模型期望具備的性格特質、價值觀與行為準則。Claude 性格的首席研究員 Amanda Askell 指出，這份文件被當作訓練指南、搭配監督式學習方法使用 [403]（而且它很可能也用於其他階段，例如類似憲法式 AI 的 RL 階段）。

模型規格與相關文件的一大未知數，是模型開發者為了讓模型遵循它們所投入的心力。兩個目標相似的組織最終可能落在非常不同的位置：如果其中一個投入大量心力去遵循一份平庸的規格，而另一個對一份出色、公開記錄的規格僅投入最低限度的追蹤。

## 17.3 產品週期與 RLHF 的下一步（Product Cycles and What's Next for RLHF）

隨著強大的 AI 模型越來越接近「產品」、而非實驗性機器學習過程的單一產物，RLHF 已成為模型與產品之間關係的介面。要讓模型好用，需要的遠不只是把最終模型權重調對——還需要快速的推論、適合搭配使用的工具（例如搜尋或程式碼執行）、可靠且易懂的使用者介面等等。RLHF 研究之所以成為許多這類事項的測試介面，一方面是因為 RLHF 被定位為即時理解使用者產品偏好的方式，另一方面是因為它是發布前的最後一個訓練階段。為模型加入新功能最快的方式，就是在訓練更快、成本更低的後訓練階段嘗試並整合它。這個循環已見於影像理解、工具使用、更好的行為等等。原本是產品問題的事情，很快就變成 RLHF 建模問題，而如果它成功了，就會反向傳播到其他更早的訓練階段。

RLHF 問題的根本性質，在於我們無法精確地為人類偏好建模，因此，儘管本書所發展的最佳實務與工具會隨著我們應用 AI 的領域改變而演進，它們所解決的核心問題終將歸結為相同的取捨。RLHF 是一個框架設計得如此巧妙的問題，讓我們得以無止境地持續打磨它，將一個暗藏人性的過程，嵌入到強大 AI 工具的最深層。
