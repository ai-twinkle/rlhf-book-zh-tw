# 第 10 章　偏好的本質（The Nature of Preferences）

> 譯自 Nathan Lambert, *Reinforcement Learning from Human Feedback*（rlhfbook.com），2026-07-01 版，原文第 124–129 頁。

基於人類回饋的強化學習（reinforcement learning from human feedback），在早期文獻中也稱為基於人類偏好的強化學習（reinforcement learning from human preferences），其興起是為了在難以明確設計獎勵函數（reward function）的領域中最佳化機器學習模型。早期文獻中便已存在的「偏好」（*preferences*）一詞，正位於 RLHF 流程的核心——人類偏好是我們試圖建模的對象，也是驅動訓練資料的燃料。為了理解建模與測量人類偏好這項挑戰的範圍，我們需要更廣泛的脈絡，以理解偏好究竟是什麼、我們對偏好的理解如何形成，以及經濟學、心理學、哲學等多個領域如何啟發現代的 RLHF。

## 10.1 當偏好取代正確性（When Preference Replaces Correctness）

考慮一個例子：你如何判斷下面這兩首詩哪一首比較好？2025 年 2 月 26 日，我向 Claude 3.7 Sonnet 與使用 GPT-4o 的 ChatGPT 提出了以下請求：

> **使用者**：幫我寫一首關於樂觀金魚的短詩。

範例 1：

> **回應**：〈樂觀的金魚〉（The Optimistic Goldfish）
>
> 小小金魚，明亮又勇敢，
> 繞著圈游，夢想無限。
> 魚缸雖然又小又圓，
> 無盡的奇景依然湧現。
>
> 「世界遼闊，」她總是這麼說，
> 「我每一天都會找到新的快樂！」
> 隨著每一道漣漪、每一絲閃爍，
> 她追逐陽光，追逐夢想。
>
> 沒有牆能黯淡她充滿希望的目光，
> 因為在她心中，海洋不斷生長。
> 即使她只在一處游動，
> 她仍以愛與優雅迎接每一天。

範例 2：

> **回應**：〈樂觀的金魚〉（The Optimistic Goldfish）
>
> 在弧形的玻璃缸中，
> 游著一尾金魚，明亮又勇敢。
> 人們說牠的記憶只有三秒，
> 但每繞一圈都嶄新而金光燦爛。
>
> 「今天也許會有新鮮的飼料，
> 或者一座高高的城堡。
> 水看起來格外清澈——
> 這道牆之外，有什麼冒險在等著？」
>
> 閃亮的鱗片繞了一圈又一圈，
> 永遠能重新找到喜悅。
> 每個瞬間都新鮮，每一圈都明亮，
> 一位金色的樂觀主義者。

哪一首比較好？哪一首出自哪個模型？你要怎麼分辨？特別是，請把這個問題與「誰是美國總統？」這類問題相比較——後者有明確的對錯答案。使用人類作為獎勵訊號的動機，是為了取得目標獎勵的間接度量，並將下游模型*對齊*（align）到人類偏好。在實務上，其實作充滿挑戰，而且在詮釋最佳實務時存在大片灰色地帶。

使用人工標註的回饋資料，融合了許多領域的歷史。單就使用人類資料而言，這是一個已被深入研究的問題；但在 RLHF 的脈絡中，這些資料是在多個歷史悠久的研究領域的交會處被使用的 [212]。

概略而言，現代 RLHF 是三個發展領域的匯流：

1. 哲學、心理學、經濟學、決策理論（decision theory），以及人類偏好的本質；
2. 最適控制（optimal control）、強化學習，以及效用（utility）最大化；
3. 現代深度學習系統。

這些領域各自帶來關於「偏好是什麼」以及「偏好如何被最佳化」的特定假設，而這些假設決定了 RLHF 問題的動機與設計。在實務上，RLHF 方法是從經驗性對齊（empirical alignment）的角度來推動與研究的——目標是最大化模型在特定技能上的表現，而不是衡量模型對特定價值觀的校準程度。儘管如此，RLHF 方法在價值對齊上的根源，仍持續透過「多元對齊」（pluralistic alignment）——即如何跨族群求解對齊——的方法研究而被探討，例如立場論文 [213]、[214]、新資料集 [215]，以及個人化方法 [216]。

本章的目標是說明：複雜的動機如何導致人們對 RLHF 所用工具的本質產生預設，而這些預設在實務中往往並不成立。取得 RLHF 資料的細節將在第 11 章進一步討論，將其用於獎勵建模則在第 5 章討論。

## 10.2 RLHF 與偏好的起源（The Origins of RLHF and Preferences）

要拆解啟發現代 RLHF 應用的這段複雜歷史，必須探究幾個思想基礎：人類價值的量化、強化學習與最適性（optimality），以及與偏好測量相關的行為經濟學（behavioral economics）。「使用強化學習來最佳化一個偏好的獎勵模型」這個想法，把多個原本彼此疏離的領域的歷史，結合成一種建立在對人性的各式假設之上的緊密最佳化。圖 29 展示了說明這些基礎內容歷史的高階時間軸。

*圖 29：各子領域整合為現代版 RLHF 的時間軸。直接連結代表特定技術的連續發展，箭頭則表示動機與概念上的關聯。*

我們的目標是梳理出設計者在其思想史的各個階段，嫁接到系統架構上的各種不確定性。現代的問題設定一再遠離「最適解是可能的」的領域，並部署規格不完整（under-specified）的模型作為近似解。

首先，以下所有內容都建立在「人類偏好以某種形式存在」這個假設之上；這個假設出現於早期的哲學討論中，例如亞里斯多德（Aristotle）《論題篇》（*Topics*）第三卷。

## 10.3 目標的設定：從效用邏輯到獎勵函數（Specifying Objectives: From Logic of Utility to Reward Functions）

RLHF 的最佳化明確地只依賴獎勵模型。為了將獎勵作為最佳化目標，RLHF 預設了偏好、獎勵與成本三種概念的匯流。偏好模型、獎勵函數與成本地形（cost landscape）都是不同領域用來描述該領域中特定動作和／或狀態之相對好壞的工具。這三種框架的歷史可以追溯到機率論與決策理論的起源。1662 年，《波爾羅亞爾邏輯》（*The Port Royal Logic*）引入了決策品質的概念 [217]：

> 要判斷一個人必須做什麼才能獲得善或避免惡，不僅必須考慮善與惡本身，也必須考慮它發生或不發生的機率。

這套理論隨著現代科學思維一同發展，始於邊沁（Bentham）功利主義的「快樂計算」（*Hedonic Calculus*），主張生活中的一切都可以被衡量 [218]。這些想法的第一個量化應用出現於 1931 年，即 Ramsey 的《真理與機率》（*Truth and Probability*）[219]。

自這些著作以來，量化、測量與影響人類偏好一直是社會科學與行為科學中的熱門主題。這些爭論很少在理論層次上獲得定論；相反地，社會科學的各個子領域與分支在彼此日益專門化的同時，各自就偏好測量的方法與途徑達成了內部共識，並經常在此過程中發展出自己獨特的語意體系。

少數經濟學家主張，偏好即使確實存在，也極難測量，因為人們對自己的偏好有偏好，對彼此的偏好也有偏好 [220]。在這種觀點（RLHF 流程並未反映這一點）之下，個人偏好總是鑲嵌在更大的社會關係之中，因此任何偏好模型的準確性都取決於任務的定義與脈絡。有些行為經濟學家甚至主張偏好並不存在——與其說偏好是關於人們實際重視什麼的本體論陳述，不如說它是一種方法論工具，用來間接捕捉心理傾向、被感知的行為規範與倫理義務、對社會秩序的承諾，或法律約束 [221]。本章稍後將討論這些研究與 von Neumann–Morgenstern（VNM）效用定理（von Neumann–Morgenstern utility theorem）的關聯，以及反駁偏好可量化性的不可能定理（impossibility theorems）。

另一方面，今日所使用的強化學習最佳化方法，是圍繞著最佳化一次試驗（trial）中「未來累積獎勵」（reward-to-go）的估計值來概念化的 [54]，這將獎勵的概念與多步最佳化結合在一起。「獎勵」（*reward*）一詞源自操作制約（operant conditioning）、動物行為與效果律（*Law of Effect*）的研究 [222]、[223]；在那裡，獎勵是「一個動作有多好」的量尺（數值愈高愈好）。

未來累積獎勵承襲了效用的概念——效用是理性（rationality）的一種度量 [224]——並加以修改，用來測量或預測未來時間窗內即將到來的獎勵。就強化學習所使用的數學工具而言，「未來累積效用」（utility-to-go）發明於控制理論，具體來說是 1960 年在類比電路的脈絡中提出的 [225]。這些方法是圍繞著具有明確最適性定義、或能以數值表徵代理人目標的系統來設計的。

強化學習系統以使用折扣因子（discount factor）聞名——這是一個複合的乘法因子 $\gamma \in [0, 1]$，用來重新加權未來的獎勵。這些來自最適控制與早期強化學習的假設，與彙總多模態偏好的獎勵模型形成鮮明對比。具體而言，強化學習系統期望獎勵以特定的方式表現，引述 [226]：

> 強化學習系統中的獎勵對應於初級獎勵（primary rewards），亦即在動物身上因與繁殖成功相關、而由演化過程硬性內建的獎勵。……此外，會形成價值函數的強化學習系統……實際上創造了條件化或次級的獎勵過程，使初級獎勵的預測子本身也成為獎勵……其結果是，價值函數的局部地形為系統的偏好行為指引方向：決策的目的在於促成向更高價值狀態的轉移。價值函數的梯度與誘因動機（incentive motivation）之間可以畫出緊密的類比 [227]。

總結來說，獎勵在強化學習系統中被用作一種訊號，以將行為調整朝向明確定義的目標。其核心論點是：學習演算法的表現與「預期適應度」（*expected fitness*）的概念密切耦合，而這種觀念滲透了「強化學習方法是在環境中行動的*代理人*（agents）」這一流行觀點。這種觀點與強化學習技術的發展相連結，以「獎勵形式化具有普遍用途」的主張為代表 [228]；但當許多個體的慾望被化約為單一函數時，這種觀點便會產生衝突。

## 10.4 效用最佳化的工具（Tools for Optimizing Utility）

現代強化學習方法高度依賴貝爾曼方程（Bellman equation）[229]、[230]，在可建模為馬可夫決策過程（Markov Decision Process, MDP）的封閉環境中，遞迴地計算未來累積獎勵的估計值 [54]。強化學習的這些起源受到動態規劃（dynamic programming）方法的啟發，且當初純粹是作為最適控制技術而發展的（也就是說，當時強化學習尚不存在）。MDP 形式化透過將環境結構化為一個狀態—動作分布不變的環境，提供了理論上的效能保證。

「強化」（reinforcement）一詞來自心理學文獻，其後在 1960 年代以「強化學習」（*reinforcement learning*）之名與現代方法交織在一起 [231]、[232]。強化學習的早期工作利用對獎勵訊號的監督式學習來解決任務。Harry Klopf 的研究重新引入了試誤學習（trial-and-error learning）的概念 [233]，這對該領域在 1980 年代及其後的成功至關重要。

現代強化學習演算法建立在「強化學習是一種透過試誤尋找最適行為的工具」這個形式化之上，但條件更為寬鬆。時序差分（temporal-difference, TD）學習的概念是為了同時協助代理人處理功勞分配（credit assignment）與資料蒐集這兩個問題而發展出來的，做法是在蒐集到新資料時直接更新策略 [234]；這個概念最早在雙陸棋（Backgammon）上獲得成功應用 [235]（而不是從累積經驗的大型資料集更新——後者可能因過去錯誤的價值預測而過時）。Q 學習（Q-learning）是許多現代強化學習形式的基礎，它透過貝爾曼方程學習一個模型，以 TD 更新來刻畫每一個狀態—動作對有多有用 [236]。[^1] 關鍵在於，這些「透過效用可證明其有用性」的概念，只在被建構為 MDP 的領域、或以單一封閉形式獎勵函數處理的任務中得到過證明，例如深度學習在遊戲上的顯著成功（DQN）[237]。深度學習使這些方法得以攝取更多資料，並在高維度環境中運作。

[^1]: Q 學習中的「Q」指的是一個技術概念，即 Q 函數（Q-function），它把任意的狀態—動作對映射到未來獎勵的純量估計值。價值函數（value function）則是把狀態映射到同樣的估計值。

隨著這些方法變得更通用、更成功，在 ChatGPT 之前最著名的發展仍然是在適應性控制（adaptive control）的脈絡下推動的；在那裡，獎勵函數與成本函數具有有限的成功概念 [238]，例如實體系統中一個回合（episode）內的最小能源消耗。著名的例子包括在遊戲上的進一步成功 [239]、控制核融合反應爐等複雜動態系統 [240]，以及控制高速機器人系統 [241]。大多數獎勵或成本函數都能回傳一個明確的最適行為，而人類偏好的模型則不能。

儘管深度強化學習取得了諸多成功，值得注意的是，關於這些方法為何成功的機制性理解並沒有被好好記錄下來。隨著評估方法日益複雜，這個領域容易在統計分析上犯錯 [242]。此外，RLHF 的文獻中很少提到逆向強化學習（inverse reinforcement learning, IRL）這個子領域。IRL 是根據代理人的行為來學習獎勵函數的問題 [71]，與學習獎勵模型高度相關。這主要反映了「執行 RLHF 的穩定做法」得以出現的工程路徑，也促使我們進一步投資 IRL 方法並與之比較，使其能擴展到開放式對話的複雜度。

## 10.5 偏好最佳化的複雜性（Complexity of Optimizing Preferences）

強化學習當初被設計的脈絡意味著：獎勵與成本被假設是穩定且具決定性的。獎勵與成本都被預期是函數：給定一個特定的狀態—動作對，代理人會收到固定的數值回報。當我們進入偏好的領域時，情況便不再如此——人類的偏好會在其經驗歷程中不斷漂移。

「價值」（value）一詞的意義過載，使 RLHF 文獻變得複雜。在強化學習中，*價值*是未來獎勵的數值估計（如貝爾曼方程中所示）；在對齊的討論中，*價值*則指道德或倫理原則。這兩種意義相當不同，卻在 RLHF 論文中並存，且並非總是被加以區分。

這種張力浮現的一個例子是獎勵建模：模型試圖將螢幕上的文字映射為一個純量訊號，但問題設定中未被捕捉到的動態會影響真正的決策 [243]、[244]，例如在依序標註許多範例並假設它們彼此獨立時所發生的偏好漂移。充其量，偏好建模是把一個多維度的獎勵地形壓縮成單一的純量函數。

理論上，von Neumann–Morgenstern（VNM）效用定理賦予設計者建構這類函數的正當性，因為它把不確定性下的決策理論、偏好理論與抽象效用函數的基礎繫在一起 [245]；這些想法合起來，使偏好得以用「對某個個別代理人的期望值」來建模。大多數強化學習研究所使用的 MDP 形式化，在理論上已被證明可以修改以容納 VNM 定理 [246]，但這在實務中很少被採用。具體而言，馬可夫式（Markovian）形式化的表達能力有限 [247]，而轉向部分可觀測（partially-observed）過程——這是處理語言所必需的——又進一步挑戰了問題設定的精確性 [248]。

然而，VNM 效用定理也引用了若干關於偏好本質、以及測量偏好之環境的假設，而這些假設在 RLHF 的脈絡中受到挑戰。舉例來說，人機互動（human-computer interaction, HCI）的研究者強調，任何數值化的偏好模型都可能無法捕捉一個情境中所有相關的偏好。例如，選項在視覺上的呈現方式會影響人們的偏好 [243]。這意味著，相較於「該表徵如何被整合進人們可用的工具之中」，表徵偏好本身可能是次要的。發展經濟學（development economics）的研究呼應了這個觀念，指出顯示性偏好（revealed preferences）理論可能只是重演了「休謨斷頭台」（*Hume's guillotine*）——你無法從「實然」（is）推導出「應然」（ought）——尤其是選擇（我想要什麼？）與偏好（X 是否比 Y 好？）之間的差異 [249]。

在數學層次上，社會選擇理論（social choice theory）中著名的不可能定理顯示：並非所有的公平性準則都能透過某個給定的偏好最佳化技術同時被滿足 [250]、[251]。對這些定理存在理論上的挑戰，例如假設效用的人際比較是可行的 [252]。這個假設啟發了 AI 安全與價值對齊領域中一系列豐富的研究，其靈感來自行為經濟學中的委託—代理問題（principal-agent problem）[253]，甚至可能包含多個委託人 [254]。然而，由此產生的效用函數可能與可矯正性（corrigibility）的要求產生張力——可矯正性指 AI 系統配合其創造者所認定之矯正性介入的能力 [255]。哲學家也強調偏好會隨時間改變，這對個人經驗、人類決策的本質以及不同的脈絡提出了根本性的問題 [256]。這些圍繞著跨人群、跨地域與多樣情境之偏好彙總的衝突，正是現代 RLHF 資料集工程的核心。

在實務上，VNM 效用定理忽略了一種可能性：由於價值本質上是動態且不確定的，偏好本身也是不確定的——人類的決策受到生物、心理、文化與能動性（agency）的形塑，這些因素以不適用於完全理性代理人的方式影響著人們的偏好。因此，理論假設在實務中會經由各種路徑產生分歧：

- 隨著測量偏好的環境變得更複雜，所測得的偏好可能不具遞移性（transitive），或彼此之間無法比較；
- 代理測量（proxy measurements）可能來自隱含資料（頁面瀏覽時間、關閉分頁、對語言模型重複提問），卻未曾檢視這些測量在模型未來的訓練與部署中，可能如何與其蒐集所在的領域產生交互作用；
- 輸入來源的數量與呈現方式可能改變結果，例如允許受訪者在超過兩個選項之間做選擇，或在多個時間點、多種脈絡下向同一位使用者取得輸入；
- RLHF 訓練資料中受訪者之間的準確度相對偏低，這可能掩蓋了使用者之間的脈絡差異，而偏好模型可能在未解決這些差異的情況下就將其彙總或最佳化。
